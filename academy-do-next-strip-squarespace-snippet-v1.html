<script>

(function(){

  if (window.__arDoNextStripInit) return;

  window.__arDoNextStripInit = true;



  function isDashboardPath(){

    var p = (window.location && window.location.pathname) ? window.location.pathname : "";

    p = p.replace(/\/+$/, "") || "/";

    return p === "/academy/dashboard";

  }



  function getSqspNavOffset(){

    var selectors = ["#header", "header.header", ".header-nav-wrapper", ".sqs-site-header"];

    for (var i = 0; i < selectors.length; i++) {

      var el = document.querySelector(selectors[i]);

      if (!el || el.contains(document.getElementById("ar-academy-header-container"))) continue;

      var h = Math.ceil(el.getBoundingClientRect().height) || Math.ceil(el.offsetHeight) || 0;

      if (h >= 40 && h <= 240) return h;

    }

    return 71;

  }



  function ensureAcademyLayout(){

    if (window.__arAcademyLayout && window.__arAcademyLayout.pinVersion === 2) {

      return window.__arAcademyLayout;

    }

    var state = { busy: false, raf: 0 };

    function ensureSpacer(id, anchor, height){

      if (!anchor) return;

      var spacer = document.getElementById(id);

      if (!height) {

        if (spacer) spacer.style.height = "0px";

        return;

      }

      if (!spacer) {

        spacer = document.createElement("div");

        spacer.id = id;

        spacer.setAttribute("aria-hidden", "true");

        anchor.insertAdjacentElement("afterend", spacer);

      }

      spacer.style.height = height + "px";

    }

    function measureStripHeight(strip){

      if (!strip || !strip.classList.contains("is-ready")) return 0;

      var inner = strip.querySelector(".ar-do-next-strip__inner") || strip;

      var h = Math.ceil(inner.offsetHeight) || 0;

      if (h > 0 && h < 2000) return h;

      var card = strip.querySelector(".ar-do-next-strip__card");

      if (card) {

        h = Math.ceil(card.offsetHeight) || 0;

        if (h > 0 && h < 2000) return h;

      }

      return 0;

    }

    function syncLayout(){

      if (state.busy) return;

      if (!isDashboardPath()) {

        document.documentElement.classList.remove("ar-dashboard-pin-stack");

        return;

      }

      var header = document.getElementById("ar-academy-header-container");

      if (!header) return;

      var strip = document.getElementById("ar-do-next-strip");

      var sqspTop = getSqspNavOffset();

      state.busy = true;

      try {

        var headerH = Math.ceil(header.offsetHeight) || 88;

        var stripH = measureStripHeight(strip);

        var root = document.documentElement;

        root.style.setProperty("--ar-sqsp-nav-offset", sqspTop + "px");

        root.style.setProperty("--ar-academy-header-height", headerH + "px");

        root.style.setProperty("--ar-do-next-strip-height", stripH + "px");

        root.style.setProperty("--ar-academy-sticky-stack-height", (sqspTop + headerH + stripH) + "px");

        root.classList.add("ar-dashboard-pin-stack");

        header.style.setProperty("position", "fixed", "important");

        header.style.setProperty("top", sqspTop + "px", "important");

        header.style.setProperty("left", "0", "important");

        header.style.setProperty("right", "0", "important");

        header.style.setProperty("width", "100%", "important");

        header.style.setProperty("max-width", "100%", "important");

        header.style.setProperty("margin-top", "0", "important");

        header.style.setProperty("z-index", "998", "important");

        if (strip && strip.classList.contains("is-ready")) {

          strip.style.setProperty("position", "fixed", "important");

          strip.style.setProperty("top", (sqspTop + headerH) + "px", "important");

  function normalizePath(url){

    if (!url || typeof url !== "string") return "/";

    var path = url;

    if (path.indexOf("http://") === 0 || path.indexOf("https://") === 0) {

      try { path = new URL(path).pathname; } catch (e) {

        var m = path.match(/https?:\/\/[^/]+(\/.*)/);

        if (m) path = m[1];

      }

    }

    path = path.split("?")[0].split("#")[0];

    path = path.replace(/\/+$/, "") || "/";

    if (path.charAt(0) !== "/") path = "/" + path;

    return path;

  }

        if (statusMap[EXAM_MODULE_IDS[i]] !== "passed") {

          nextExamModuleId = EXAM_MODULE_IDS[i];

          break;

        }

      }

    }



    return {

      statusMap: statusMap,

      examsPassed: examsPassed,

      nextExamModuleId: nextExamModuleId,

      source: source,

      hasData: hasData,

      hasModuleStatus: source === "modules-count"

    };

  }



  function firstUnpassedExam(statusMap){

    for (var i = 0; i < EXAM_MODULE_IDS.length; i++) {

      var id = EXAM_MODULE_IDS[i];

      if (statusMap[id] !== "passed") return { idx: i, id: id };

    }

    return null;

  }



  function shortArticleTitle(t){

    return String(t || "").replace(/^(\d{2})\s+/, "$1 ");

  }



  function examNum(idx){ return String(idx + 1).padStart(2, "0"); }



  function pluralWord(n, singular, plural){

    return n === 1 ? singular : plural;

  }



  function formatFoundationProximity(modulesOpened, activeDays, engagementDegraded){

    var modShort = Math.max(0, FOUNDATION_GATE.minModules - modulesOpened);

    if (engagementDegraded) {

      if (!modShort) return "";

      return modShort === 1 ? "Open 1 more module to earn Foundation" : "Open " + modShort + " more modules to earn Foundation";

    }

    var dayShort = Math.max(0, FOUNDATION_GATE.minActiveDays - activeDays);

    if (!modShort && !dayShort) return "";

    if (modShort && dayShort) {

      return "You're " + dayShort + " " + pluralWord(dayShort, "day", "days") +

        " and " + modShort + " " + pluralWord(modShort, "module", "modules") +

        " from your Foundation badge";

    }

    if (modShort) {

      return modShort === 1 ? "Open 1 more module to earn Foundation" : "Open " + modShort + " more modules to earn Foundation";

    }

    return dayShort === 1 ? "1 more active day to earn Foundation" : dayShort + " more active days to earn Foundation";

  }



  function formatPractitionerProximity(modulesOpened){

    var short = Math.max(0, 60 - modulesOpened);

    if (!short) return "";

    if (short === 1) return "Open 1 more module to earn Practitioner";

    return "You're " + short + " modules from your Practitioner badge";

  }



  function isTrialNudgeEligible(engagement){

    return engagement && engagement.isTrial === true &&

      engagement.hasConverted !== true &&

      typeof engagement.daysLeftInTrial === "number" && engagement.daysLeftInTrial > 0;

  }



  function getNextUnearnedBadge(badges){

    for (var i = 0; i < badges.length; i++) {

      if (!badges[i].earned && badges[i].key !== "master") return badges[i];

    }

    return null;

  }



  function formatTrialNudgeClause(engagement, rag, modulesOpened, activeDays, engagementDegraded, badges){

    if (!isTrialNudgeEligible(engagement)) return "";

    var next = getNextUnearnedBadge(badges);

    if (!next) return "";

    var days = engagement.daysLeftInTrial;

    if (next.key === "foundation") {

      if (!modulesOpened && (!activeDays || engagementDegraded)) {

        return "Welcome - you've got " + days + " days to explore. Open a module to get going.";

      }

      var modShort = Math.max(0, FOUNDATION_GATE.minModules - modulesOpened);

      var dayShort = engagementDegraded ? 0 : Math.max(0, FOUNDATION_GATE.minActiveDays - activeDays);

      var nearlyThere = rag.state === "green" ||

        (modShort <= 1 && dayShort <= 1 && (modShort > 0 || dayShort > 0));

      if (nearlyThere) {

        return "You've got " + days + " days to earn your Foundation badge - you're nearly there.";

      }

      return "Lots of time to earn your Foundation badge - " + days + " days to enjoy the modules.";

    }

    if (next.key === "practitioner") {

      var pShort = Math.max(0, 60 - modulesOpened);

      if (pShort <= 5) {

        return "You've got " + days + " days to push toward Practitioner - you're nearly there.";

      }

      return "Lots of time to keep exploring - " + days + " days left in your trial.";

    }

    return "You've got " + days + " days left in your trial to keep building.";

  }



  function formatGoalTileTrialLine(engagement, badges){

    if (!isTrialNudgeEligible(engagement)) return "";

    if (!getNextUnearnedBadge(badges)) return "";

    return "Plenty of time in your trial to get there.";

  }



  function computeMomentumRag(badges, modulesOpened, activeDays, examsPassed, engagementDegraded){

    var foundation = badges.filter(function(b){ return b.key === "foundation"; })[0];

    if (!foundation || !foundation.earned) {

      var modShort = Math.max(0, FOUNDATION_GATE.minModules - modulesOpened);

      var dayShort = engagementDegraded ? 0 : Math.max(0, FOUNDATION_GATE.minActiveDays - activeDays);

      var proximity = formatFoundationProximity(modulesOpened, activeDays, engagementDegraded);

      if (!modulesOpened && (!activeDays || engagementDegraded)) {

        return { state: "red", label: proximity || "Just getting started", color: RAG_COLORS.red };

      }

      if (!engagementDegraded && modShort <= 1 && dayShort <= 1 && (modShort > 0 || dayShort > 0)) {

        return { state: "green", label: "Almost there - 1 step from Foundation", color: RAG_COLORS.green };

      }

      return { state: "amber", label: proximity || "Building momentum", color: RAG_COLORS.amber };

    }

    var practitioner = badges.filter(function(b){ return b.key === "practitioner"; })[0];

    if (practitioner && !practitioner.earned) {

      var pShort = Math.max(0, 60 - modulesOpened);

      var pLabel = formatPractitionerProximity(modulesOpened);

      if (pShort <= 5) return { state: "green", label: pLabel || "Almost there", color: RAG_COLORS.green };

      return { state: "amber", label: pLabel || "Building momentum", color: RAG_COLORS.amber };

    }

    if (modulesOpened >= 30 && examsPassed >= 1) {

      return { state: "green", label: "On track to certify", color: RAG_COLORS.green };

    }

    return { state: "amber", label: "Building momentum", color: RAG_COLORS.amber };

  }

  function waitForMemberstack(maxMs){

    maxMs = typeof maxMs === "number" ? maxMs : 8000;

    return new Promise(function(resolve){

      var start = Date.now();

      (function tick(){

        if (window.$memberstackDom && typeof window.$memberstackDom.getMemberJSON === "function") {

          resolve(window.$memberstackDom);

          return;

        }

        if ((Date.now() - start) > maxMs) { resolve(null); return; }

        setTimeout(tick, 100);

      })();

    });

  }

  async function resolveMemberId(ms, member){

    var memberId = getMemberId(member);

    var idSource = memberId ? "getCurrentMember" : "none";

    if (!memberId && ms && typeof ms.getMemberJSON === "function") {

      try {

        var jsonRes = await ms.getMemberJSON();

        var mj = unwrapMember(jsonRes);

        var mjId = getMemberId(mj);

        if (mjId) { memberId = mjId; idSource = "getMemberJSON"; }

      } catch (e) { /* ignore */ }

    }

    if (!memberId) {

      var identity = await fetchWhoami();

      if (identity && identity.memberstack_id) {

        memberId = String(identity.memberstack_id);

        idSource = "whoami";

      }

    }

    return { memberId: memberId, idSource: idSource };

  }



  function unwrapMember(res){

    if (!res) return null;

    if (res.data && (res.data.email || res.data.planConnections || res.data.id)) return res;

    if (res.email || res.planConnections) return { id: res.id || null, data: res };

    if (res.data && res.data.data) return res.data;

    return res;

  }

    try {

      var state = (params.get("state") || "trial").toLowerCase();

      var modules = parseInt(params.get("modules") || params.get("modulesopened") || "0", 10);

      if (state === "annual" && !params.has("modules")) modules = 20;

      if (state === "annual" && !params.has("activedays")) activeDays = 7;

      if (typeof ms.getCurrentMember === "function") memberRes = await ms.getCurrentMember();

    } catch (e) { /* ignore */ }

    var member = unwrapMember(memberRes);

    if (member && !member.data && (member.planConnections || member.email)) {

      member = { id: member.id || null, data: member };

    }

    if (member && !member.id && member.data && member.data.id) {

      member.id = String(member.data.id);

    }

    var resolved = await resolveMemberId(ms, member);

    var memberId = resolved.memberId;



    if (memberId) {

      var expired = await fetchTrialExpired(memberId);

      if (expired || isExpiredTrialBody()) {

        strip.classList.remove("is-ready");

        strip.setAttribute("aria-hidden", "true");

        scheduleLayout();

        return;

      }

    }



    var jsonRes = null;

    try { jsonRes = await ms.getMemberJSON(); } catch (e) { jsonRes = null; }

    var normalized = normalizeMemberJson(jsonRes);

    var memberEmail = getMemberEmail(member);

    var preview = parsePreviewConfig(memberId, memberEmail);

    var openedSet = getOpenedSet(normalized);

    var examInfo = parseExamProgress(null);

    var engagement = null;

    var engagementDegraded = true;



    if (preview) {

      openedSet = buildPreviewOpenedSet(preview.modulesOpened);

      examInfo = buildPreviewExamInfo(preview.examsPassed);

      engagement = buildPreviewEngagement(preview);

      engagementDegraded = false;

    } else {

      var progressData = await fetchExamProgress(memberId);

      examInfo = parseExamProgress(progressData);

      engagement = await fetchEngagementSummary(memberId);

      engagementDegraded = !engagement;

    }



    var coachDebug = {

      memberId: memberId || null,

      idSource: resolved.idSource,

      source: examInfo.source,

      nextExamModuleId: examInfo.nextExamModuleId,

      stage: preview ? "preview" : "stage1",

      engagementDegraded: engagementDegraded,

      distinctActiveDaysFirst14d: engagement ? engagement.distinctActiveDaysFirst14d : null,

      isTrial: engagement ? engagement.isTrial : null,

      daysLeftInTrial: engagement ? engagement.daysLeftInTrial : null,

      hasConverted: engagement ? engagement.hasConverted : null,

      previewMode: preview || null

    };

    window.__arDoNextStrip = coachDebug;



    renderStrip(openedSet, examInfo, coachDebug, engagement);

    if (!preview) trackPageView(memberId, memberEmail);

    } catch (err) {

      console.error("[do-next] init failed:", err);

      var statusEl = document.getElementById("ar-do-next-status");

      if (statusEl) statusEl.textContent = "Learning coach could not load. Refresh the page.";

      strip.classList.add("is-ready");

      strip.removeAttribute("aria-hidden");

      scheduleLayout();

    }

  }



  ensureAcademyLayout();

  wireJourneyToggle();

  watchDoNextStripMetrics();

  window.addEventListener("scroll", function(){ scheduleLayout(); }, { passive: true });

  if (document.readyState === "loading") {

    document.addEventListener("DOMContentLoaded", init);

  } else {

    init();

  }

  setTimeout(scheduleLayout, 100);

  setTimeout(scheduleLayout, 1000);

  setTimeout(scheduleLayout, 2500);

})();

</script>
