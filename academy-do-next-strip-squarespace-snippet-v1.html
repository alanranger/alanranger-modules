        label: stage.label,

        sublabel: stage.sublabel,

        iconClass: stage.iconClass,

        earned: isJourneyStageEarned(stage, modulesOpened, examsPassed)

      };

    });

  }



  function getCurrentStage(badges){

    var current = badges[0];

    for (var i = 0; i < badges.length; i++) {

      if (badges[i].earned) current = badges[i];

    }

    return {

      key: current.key,

      label: current.label,

      levelIndex: JOURNEY_STAGES.findIndex(function(s){ return s.key === current.key; }) + 1,

      levelTotal: JOURNEY_STAGES.length,

      iconClass: current.iconClass

    };

  }



  function journeyIconSvg(iconClass){

    return JOURNEY_ICON_SVGS[iconClass] || JOURNEY_ICON_SVGS["ti-school"];

  }



  function buildBadgeRail(modulesOpened, examsPassed){

    var badges = computeJourneyBadges(modulesOpened, examsPassed);

    var earnedCount = badges.filter(function(b){ return b.earned; }).length;

    var rail = document.createElement("div");

    var head = document.createElement("div");

    head.className = "ar-do-next-badge-rail__head";

    var title = document.createElement("p");

    title.className = "ar-do-next-badge-rail__title";

    title.textContent = "Your journey";

    var count = document.createElement("p");

    count.className = "ar-do-next-badge-rail__count";

    count.textContent = earnedCount + " of " + badges.length + " earned";

    head.appendChild(title);

    head.appendChild(count);

    var row = document.createElement("div");

    row.className = "ar-do-next-badge-rail__row";

    badges.forEach(function(badge){

      var item = document.createElement("div");

      item.className = "ar-do-next-badge " + (badge.earned ? "ar-do-next-badge--earned" : "ar-do-next-badge--ghost");

      var circle = document.createElement("div");

      circle.className = "ar-do-next-badge__circle";

      circle.innerHTML = journeyIconSvg(badge.iconClass);

      var label = document.createElement("p");

      label.className = "ar-do-next-badge__label";

      label.textContent = badge.label;

      var sub = document.createElement("p");

      sub.className = "ar-do-next-badge__sublabel";

      sub.textContent = badge.sublabel;

      item.appendChild(circle);

      item.appendChild(label);

      item.appendChild(sub);

      row.appendChild(item);

    });

    rail.appendChild(head);

    rail.appendChild(row);

    return { rail: rail, badges: badges, badgesEarned: earnedCount };

  }



  function injectBannerCurrentStage(badges){

    var welcome = document.getElementById("ar-academy-header-welcome");

    if (!welcome) return;

    var current = getCurrentStage(badges);

    var existing = document.getElementById("ar-do-next-banner-stage");

    if (!existing) {

      existing = document.createElement("div");

      existing.id = "ar-do-next-banner-stage";

      welcome.appendChild(existing);

    }

    existing.innerHTML = "";

    var circle = document.createElement("div");

    circle.className = "ar-do-next-banner-stage__circle";

    circle.innerHTML = journeyIconSvg(current.iconClass);

    var label = document.createElement("p");

    label.className = "ar-do-next-banner-stage__label";

    label.textContent = current.label;

    var caption = document.createElement("p");

    caption.className = "ar-do-next-banner-stage__caption";

    caption.textContent = "Level " + current.levelIndex + " of " + current.levelTotal;

    existing.appendChild(circle);

    existing.appendChild(label);

    existing.appendChild(caption);

    return current;

  }



  function normalizePath(url){

    if (!url || typeof url !== "string") return "/";

    var path = url;

    if (path.indexOf("http://") === 0 || path.indexOf("https://") === 0) {

      try { path = new URL(path).pathname; } catch (e) {

        var m = path.match(/https?:\/\/[^/]+(\/.*)/);

        if (m) path = m[1];

      }

    }

    path = path.split("?")[0].split("#")[0];

    path = path.replace(/\/+$/, "") || "/";

    if (path.charAt(0) !== "/") path = "/" + path;

    return path;

  }



  function unwrapStoredJson(obj){

    var cur = obj;

    for (var i = 0; i < 10; i++) {

      if (!cur || typeof cur !== "object") break;

      if (!cur.data || typeof cur.data !== "object") break;

      var d = cur.data;

      var looks = (d.history && Array.isArray(d.history)) ||

        (d.bookmarks && Array.isArray(d.bookmarks)) ||

        (d.arAcademy && typeof d.arAcademy === "object");

      if (looks) { cur = d; continue; }

      break;

    }

    return cur || {};

  }



  function normalizeMemberJson(jsonRes){

    if (!jsonRes || typeof jsonRes !== "object") return {};

    var stored = (jsonRes.data && typeof jsonRes.data === "object") ? jsonRes.data : jsonRes;

    return unwrapStoredJson(stored);

  }



  function getOpenedSet(normalized){

    var opened = (normalized && normalized.arAcademy && normalized.arAcademy.modules && normalized.arAcademy.modules.opened) || {};

    var set = new Set();

    Object.keys(opened).forEach(function(key){

      var p = normalizePath(key);

      if (FOUNDATION_MODULE_PATHS.indexOf(p) !== -1) set.add(p);

    });

    return set;

  }



  function firstUnopenedArticle(openedSet){

    for (var i = 0; i < ARTICLE_MODULES.length; i++) {

      if (!openedSet.has(ARTICLE_MODULES[i].p)) return { idx: i, mod: ARTICLE_MODULES[i] };

    }

    return null;

  }



  function getMemberId(member){

    if (!member) return "";

    if (member.id) return String(member.id);

    if (member.data && member.data.id) return String(member.data.id);

    return "";

  }



  function parseExamProgress(progressData){

    var statusMap = {};

    var source = "none";

    var examsPassed = 0;

    var nextExamModuleId = null;

    var hasData = false;



    EXAM_MODULE_IDS.forEach(function(id){ statusMap[id] = "not_taken"; });



    if (progressData && Array.isArray(progressData.modules) && progressData.modules.length) {

      hasData = true;

      progressData.modules.forEach(function(m){

        if (!m || !m.moduleId) return;

        if (EXAM_MODULE_IDS.indexOf(m.moduleId) === -1) return;

        statusMap[m.moduleId] = m.status || "not_taken";

      });

      examsPassed = EXAM_MODULE_IDS.filter(function(id){ return statusMap[id] === "passed"; }).length;

      source = "modules-count";

    } else if (progressData && progressData.summary && typeof progressData.summary.passedCount === "number") {

      hasData = true;

      examsPassed = Math.min(15, Math.max(0, progressData.summary.passedCount));

      source = "summary.passedCount";

    }



    if (source === "modules-count") {

      for (var i = 0; i < EXAM_MODULE_IDS.length; i++) {

        if (statusMap[EXAM_MODULE_IDS[i]] !== "passed") {

          nextExamModuleId = EXAM_MODULE_IDS[i];

          break;

        }

      }

    }



    return {

      statusMap: statusMap,

      examsPassed: examsPassed,

      nextExamModuleId: nextExamModuleId,

      source: source,

      hasData: hasData,

      hasModuleStatus: source === "modules-count"

    };

  }



  function firstUnpassedExam(statusMap){

    for (var i = 0; i < EXAM_MODULE_IDS.length; i++) {

      var id = EXAM_MODULE_IDS[i];

      if (statusMap[id] !== "passed") return { idx: i, id: id };

    }

    return null;

  }



  function shortArticleTitle(t){

    return String(t || "").replace(/^(\d{2})\s+/, "$1 ");

  }



  function examNum(idx){ return String(idx + 1).padStart(2, "0"); }



  function computeRagState(openedCount, examsPassed){

    if (openedCount < 3) {

      return { state: "red", label: "Just getting started", color: RAG_COLORS.red };

    }

    if (openedCount >= 30 && examsPassed >= 1) {

      return { state: "green", label: "On track to certify", color: RAG_COLORS.green };

    }

    return { state: "amber", label: "Building momentum", color: RAG_COLORS.amber };

  }



  function buildResumeTile(openedSet, examInfo, rag){

    var openedCount = openedSet.size;

    var nextArt = firstUnopenedArticle(openedSet);

    var tile = { n: 1, label: "1 - Resume", variant: "resume", why: "Pick up where you left off" };

    if (rag.state === "red") tile.why = "This is the most important step";

    if (nextArt) {

      var prefix = openedCount === 0 ? "Start here:" : "Continue:";

      tile.action = prefix + " " + shortArticleTitle(nextArt.mod.t) + " \u2192";

      tile.href = SITE + nextArt.mod.p;

      return tile;

    }

    if (examInfo.hasModuleStatus && examInfo.examsPassed < 15) {

      var nextExam = firstUnpassedExam(examInfo.statusMap);

      if (nextExam) {

        tile.action = "Take your next exam: " + examNum(nextExam.idx) + " " + (EXAM_NAMES[nextExam.id] || "Exam") + " \u2192";

        tile.href = EXAM_BASE + "?module=" + nextExam.id;

        return tile;

      }

    }

    tile.action = "Explore practice assignments \u2192";

    tile.href = PRACTICE_URL;

    return tile;

  }



  function buildTestTile(examInfo){

    var tile = { n: 2, label: "2 - Test yourself", variant: "ghost-green", why: "Earns a certificate" };

    if (examInfo.examsPassed >= 15) {

      tile.action = "Review your certificates \u2192";

      tile.href = EXAM_BASE;

      tile.why = "All 15 exams passed";

      return tile;

    }

    if (examInfo.hasModuleStatus) {

      var nextExam = firstUnpassedExam(examInfo.statusMap);

      if (nextExam) {

        tile.action = "Take exam: " + examNum(nextExam.idx) + " " + (EXAM_NAMES[nextExam.id] || "Exam") + " \u2192";

        tile.href = EXAM_BASE + "?module=" + nextExam.id;

        return tile;

      }

    }

    tile.action = "View exams and certificates \u2192";

    tile.href = EXAM_BASE;

    return tile;

  }



  function buildPracticeTile(){

    return {

      n: 3,

      label: "3 - Put it into practice",

      action: "Save a field checklist \u2192",

      why: "Take it on your next shoot",

      href: CHECKLISTS_URL,

      variant: "ghost-green"

    };

  }



  function buildGoalTile(openedCount, examsPassed, nextArt){

    var tile = { n: 4, label: "4 - Goal", variant: "amber" };

    var goalTarget = null;

    var goalRemaining = 0;

    if (openedCount < 30) {

      goalTarget = 30;

      goalRemaining = 30 - openedCount;

      tile.action = "Reach 30 modules \u2192";

      tile.why = goalRemaining + " to your halfway badge";

      tile.href = nextArt ? SITE + nextArt.mod.p : FOUNDATION_COURSE_URL;

    } else if (openedCount < 60) {

      goalTarget = 60;

      goalRemaining = 60 - openedCount;

      tile.action = "Reach 60 modules \u2192";

      tile.why = goalRemaining + " to finish the foundations course";

      tile.href = nextArt ? SITE + nextArt.mod.p : FOUNDATION_COURSE_URL;

    } else if (examsPassed < 15) {

      goalTarget = 15;

      goalRemaining = 15 - examsPassed;

      tile.action = "Finish your certificates \u2192";

      tile.why = goalRemaining + " exams to full certification";

      tile.href = EXAM_BASE;

    } else {

      tile.action = "All done - explore practice packs \u2192";

      tile.why = "You have completed the foundations course";

      tile.href = PRACTICE_URL;

    }

    return { tile: tile, goalTarget: goalTarget, goalRemaining: goalRemaining };

  }



  function buildStage1Tiles(openedSet, examInfo, rag){

    var openedCount = openedSet.size;

    var nextArt = firstUnopenedArticle(openedSet);

    var goal = buildGoalTile(openedCount, examInfo.examsPassed, nextArt);

    return {

      tiles: [

        buildResumeTile(openedSet, examInfo, rag),

        buildTestTile(examInfo),

        buildPracticeTile(),

        goal.tile

      ],

      goalTarget: goal.goalTarget,

      goalRemaining: goal.goalRemaining

    };

  }



  function renderTile(tile){

    var a = document.createElement("a");

    a.className = "ar-do-next-tile ar-do-next-tile--" + tile.variant;

    a.href = tile.href;

    var eyebrow = document.createElement("span");

    eyebrow.className = "ar-do-next-tile__eyebrow";

    eyebrow.textContent = tile.label;

    var action = document.createElement("span");

    action.className = "ar-do-next-tile__action";

    action.textContent = tile.action;

    var why = document.createElement("span");

    why.className = "ar-do-next-tile__why";

    why.textContent = tile.why;

    a.appendChild(eyebrow);

    a.appendChild(action);

    a.appendChild(why);

    return a;

  }



  function renderStrip(openedSet, examInfo, coachDebug){

    var strip = document.getElementById("ar-do-next-strip");

    var badgeRailEl = document.getElementById("ar-do-next-badge-rail");

    var statusEl = document.getElementById("ar-do-next-status");

    var barFill = document.getElementById("ar-do-next-bar-fill");

    var tilesEl = document.getElementById("ar-do-next-tiles");

    if (!strip || !statusEl || !barFill || !tilesEl) return;



    var openedCount = openedSet.size;

    var examsPassed = examInfo.examsPassed;

    var rag = computeRagState(openedCount, examsPassed);

    var pct = Math.round((openedCount / MODULES_TOTAL) * 100);

    var stage = buildStage1Tiles(openedSet, examInfo, rag);

    var badgeRail = buildBadgeRail(openedCount, examsPassed);

    var currentStage = injectBannerCurrentStage(badgeRail.badges);



    if (badgeRailEl) {

      badgeRailEl.innerHTML = "";

      badgeRailEl.appendChild(badgeRail.rail);

    }



    statusEl.innerHTML = "";

    var left = document.createElement("div");

    left.className = "ar-do-next-strip__status-left";

    var dot = document.createElement("span");

    dot.className = "ar-do-next-rag__dot ar-do-next-rag__dot--" + rag.state;

    dot.setAttribute("aria-hidden", "true");

    var label = document.createElement("span");

    label.className = "ar-do-next-rag__label";

    label.textContent = rag.label;

    var counts = document.createElement("span");

    counts.className = "ar-do-next-strip__counts";

    counts.textContent = " - " + openedCount + "/60 modules - " + examsPassed + "/15 exams";

    left.appendChild(dot);

    left.appendChild(label);

    left.appendChild(counts);

    var right = document.createElement("span");

    right.className = "ar-do-next-strip__pct";

    right.textContent = pct + "% of the foundations course";

    statusEl.appendChild(left);

    statusEl.appendChild(right);



    barFill.style.width = pct + "%";

    barFill.style.background = rag.color;



    tilesEl.innerHTML = "";

    stage.tiles.forEach(function(tile){ tilesEl.appendChild(renderTile(tile)); });



    if (coachDebug) {

      coachDebug.ragState = rag.state;

      coachDebug.ragLabel = rag.label;

      coachDebug.modulesOpened = openedCount;

      coachDebug.modulesTotal = MODULES_TOTAL;

      coachDebug.examsPassed = examsPassed;

      coachDebug.examsTotal = 15;

      coachDebug.tiles = stage.tiles.map(function(t){

        return { n: t.n, label: t.label, href: t.href, action: t.action };

      });

      coachDebug.goalTarget = stage.goalTarget;

      coachDebug.goalRemaining = stage.goalRemaining;

      coachDebug.badges = badgeRail.badges.map(function(b){

        return { key: b.key, label: b.label, earned: b.earned };

      });

      coachDebug.badgesEarned = badgeRail.badgesEarned;

      coachDebug.currentStage = currentStage ? {

        key: currentStage.key,

        label: currentStage.label,

        levelIndex: currentStage.levelIndex,

        levelTotal: currentStage.levelTotal

      } : null;

      coachDebug.ragDataNote = "module-opens and exam-passes only; login count not read client-side";

    }



    strip.classList.add("is-ready");

    strip.removeAttribute("aria-hidden");

  }



  function isExpiredTrialBody(){

    return document.body && document.body.getAttribute("data-ar-academy-state") === "expired-trial";

  }



  function waitForMemberstack(maxMs){

    maxMs = typeof maxMs === "number" ? maxMs : 8000;

    return new Promise(function(resolve){

      var start = Date.now();

      (function tick(){

        if (window.$memberstackDom && typeof window.$memberstackDom.getMemberJSON === "function") {

          resolve(window.$memberstackDom);

          return;

        }

        if ((Date.now() - start) > maxMs) { resolve(null); return; }

        setTimeout(tick, 100);

      })();

    });

  }



  function getMemberEmail(member){

    var d = member && member.data ? member.data : {};

    return d.email || d.emailAddress || d.loginEmail || (member && member.email) || "";

  }



  async function fetchWhoami(){

    try {

      var res = await fetch(WHOAMI_URL, { credentials: "include" });

      if (!res.ok) return null;

      return await res.json();

    } catch (e) { return null; }

  }



  async function resolveMemberId(ms, member){

    var memberId = getMemberId(member);

    var idSource = memberId ? "getCurrentMember" : "none";

    if (!memberId && ms && typeof ms.getMemberJSON === "function") {

      try {

        var jsonRes = await ms.getMemberJSON();

        var mj = unwrapMember(jsonRes);

        var mjId = getMemberId(mj);

        if (mjId) { memberId = mjId; idSource = "getMemberJSON"; }

      } catch (e) { /* ignore */ }

    }

    if (!memberId) {

      var identity = await fetchWhoami();

      if (identity && identity.memberstack_id) {

        memberId = String(identity.memberstack_id);

        idSource = "whoami";

      }

    }

    return { memberId: memberId, idSource: idSource };

  }



  function unwrapMember(res){

    if (!res) return null;

    if (res.data && (res.data.email || res.data.planConnections || res.data.id)) return res;

    if (res.email || res.planConnections) return { id: res.id || null, data: res };

    if (res.data && res.data.data) return res.data;

    return res;

  }



  async function fetchTrialExpired(memberId){

    if (!memberId) return false;

    try {

      var res = await fetch(TRIAL_STATUS_URL + "?memberId=" + encodeURIComponent(memberId), { credentials: "omit" });

      if (!res.ok) return false;

      var data = await res.json();

      return !!(data && (data.isExpiredTrial || data.state === "expired-trial"));

    } catch (e) { return false; }

  }



  async function fetchExamProgress(memberId){

    if (!memberId) return null;

    try {

      var res = await fetch(PROGRESS_URL, {

        headers: { "X-Memberstack-Id": memberId },

        credentials: "omit"

      });

      if (!res.ok) return null;

      return await res.json();

    } catch (e) { return null; }

  }



  function trackPageView(memberId, email){

    if (!memberId) return;

    var key = "ar-pv-dashboard-" + memberId;

    try {

      if (sessionStorage.getItem(key) === "1") return;

      sessionStorage.setItem(key, "1");

    } catch (e) { /* ignore */ }



    fetch(TRACK_URL, {

      method: "POST",

      headers: { "Content-Type": "application/json" },

      credentials: "omit",

      body: JSON.stringify({

        member_id: memberId,

        email: email || null,

        path: "/academy/dashboard",

        title: "Academy Dashboard",

        category: "dashboard",

        meta: { source: "do-next-strip", surface: "dashboard" }

      })

    }).catch(function(){ /* non-blocking */ });

  }



  function watchExpiredTrial(onChange){

    if (!document.body) return;

    if (isExpiredTrialBody()) onChange(true);

    var obs = new MutationObserver(function(){ onChange(isExpiredTrialBody()); });

    obs.observe(document.body, { attributes: true, attributeFilter: ["data-ar-academy-state"] });

    setTimeout(function(){ obs.disconnect(); }, 30000);

  }



  async function init(){

    var strip = document.getElementById("ar-do-next-strip");

    if (!strip) return;



    watchExpiredTrial(function(expired){

      if (expired) {

        strip.classList.remove("is-ready");

        strip.setAttribute("aria-hidden", "true");

      }

    });

    if (isExpiredTrialBody()) return;



    var ms = await waitForMemberstack();

    if (!ms) {

      var statusEl = document.getElementById("ar-do-next-status");

      if (statusEl) statusEl.textContent = "Sign in to see your learning coach.";

      strip.classList.add("is-ready");

      return;

    }



    var memberRes = null;

    try {

      if (typeof ms.getCurrentMember === "function") memberRes = await ms.getCurrentMember();

    } catch (e) { /* ignore */ }

    var member = unwrapMember(memberRes);

    if (member && !member.data && (member.planConnections || member.email)) {

      member = { id: member.id || null, data: member };

    }

    if (member && !member.id && member.data && member.data.id) {

      member.id = String(member.data.id);

    }

    var resolved = await resolveMemberId(ms, member);

    var memberId = resolved.memberId;



    if (memberId) {

      var expired = await fetchTrialExpired(memberId);

      if (expired || isExpiredTrialBody()) return;

    }



    var jsonRes = null;

    try { jsonRes = await ms.getMemberJSON(); } catch (e) { jsonRes = null; }

    var normalized = normalizeMemberJson(jsonRes);

    var openedSet = getOpenedSet(normalized);

    var progressData = await fetchExamProgress(memberId);

    var examInfo = parseExamProgress(progressData);



    var coachDebug = {

      memberId: memberId || null,

      idSource: resolved.idSource,

      source: examInfo.source,

      nextExamModuleId: examInfo.nextExamModuleId,

      stage: "stage1"

    };

    window.__arDoNextStrip = coachDebug;



    renderStrip(openedSet, examInfo, coachDebug);

    trackPageView(memberId, getMemberEmail(member));

  }



  if (document.readyState === "loading") {

    document.addEventListener("DOMContentLoaded", init);

  } else {

    init();

  }

})();

</script>
