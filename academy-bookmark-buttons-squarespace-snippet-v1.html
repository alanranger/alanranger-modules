<style id="ar-bookmark-style">
  /* Force the widget to remain visible even if Sqsp applies fade-in rules */
  #ar-bookmark-widget,
  #ar-bookmark-widget *{
    opacity:1 !important;
    visibility:visible !important;
    display:initial;
  }
  #ar-bookmark-widget{
    display:flex !important;
    align-items:center !important;
    gap:14px !important;
    flex-wrap:wrap !important;
    position:relative !important;
    z-index:9999 !important;
    margin:12px 0 !important;
    pointer-events:auto !important;
  }

  /* Make buttons consistent and "bulletproof" */
  #ar-bookmark-widget .ar-btn{
    display:inline-flex !important;
    align-items:center !important;
    gap:10px !important;
    padding:10px 20px !important;
    border:none !important;
    border-radius:8px !important;
    cursor:pointer !important;
    font-weight:800 !important;
    font-size:16px !important;
    line-height:1 !important;
    text-decoration:none !important;
    background:#E57200 !important;
    color:#fff !important;
    user-select:none !important;
    -webkit-font-smoothing:antialiased;
  }
  #ar-bookmark-widget .ar-btn:visited{ color:#fff !important; }
  #ar-bookmark-widget .ar-btn:hover{ filter:brightness(0.95); }
  #ar-bookmark-widget .ar-btn:active{ transform:translateY(1px); }
  #ar-bookmark-widget .ar-btn.is-hidden{ display:none !important; }
  /* Forward actions: match dashboard course CTA green (#16a34a core, gradient from .ar-academy-dashboard__course-cta) */
  #ar-bookmark-widget #ar-next-module-btn,
  #ar-bookmark-widget #ar-take-exam-btn{
    background:linear-gradient(180deg,#34d399 0%,#16a34a 55%,#15803d 100%) !important;
    border:2px solid #4ade80 !important;
    color:#fff !important;
    text-shadow:0 1px 0 rgba(0,0,0,0.25);
    box-shadow:0 0 0 1px rgba(255,255,255,0.2) inset,0 4px 16px rgba(34,197,94,0.45);
  }
  #ar-bookmark-widget #ar-next-module-btn:hover,
  #ar-bookmark-widget #ar-take-exam-btn:hover{
    filter:brightness(1.08) saturate(1.05);
  }

  #ar-bookmark-widget .ar-help{
    width:100%;
    margin-top:6px;
    color:#111827;
    font-size:13px;
    font-weight:700;
  }
</style>

<div id="ar-bookmark-widget">
  <button id="bookmark-btn" class="ar-btn" type="button">
    ⭐ <span>Bookmark this page</span>
  </button>

  <a class="ar-btn" id="back-to-modules-btn"
     href="https://www.alanranger.com/academy/online-photography-course">
    ← <span>Back to Modules</span>
  </a>

  <a class="ar-btn" id="back-to-dashboard-btn"
     href="https://www.alanranger.com/academy/dashboard">
    ← <span>Back to Dashboard</span>
  </a>

  <a class="ar-btn is-hidden" id="ar-next-module-btn" href="#" aria-hidden="true">
    <span>Next module</span>
  </a>

  <a class="ar-btn is-hidden" id="ar-take-exam-btn" href="#" aria-hidden="true">
    <span>Take the exam</span>
  </a>

  <div id="bookmark-help" class="ar-help">
    Saves to your Academy Dashboard. Maximum 20 bookmarks per account.
  </div>
</div>

<script>
(function(){
  // Prevent multiple runs if snippet is injected more than once
  if (window.__arBookmarkWidgetInit) return;
  window.__arBookmarkWidgetInit = true;

  function normAbsUrl(){
    return window.location.origin + window.location.pathname;
  }

  function normalizePath(url){
    if (!url || typeof url !== "string") return "/";
    var path = url;
    if (path.indexOf("http://") === 0 || path.indexOf("https://") === 0) {
      try { path = new URL(path).pathname; } catch (e) {
        var m = path.match(/https?:\/\/[^/]+(\/.*)/);
        if (m) path = m[1];
      }
    }
    path = path.split("?")[0].split("#")[0];
    path = path.replace(/\/+$/, "") || "/";
    if (path.charAt(0) !== "/") path = "/" + path;
    return path;
  }

  var SITE = "https://www.alanranger.com";
  var FOUNDATION_URL = SITE + "/academy/online-photography-course";
  var EXAM_BASE = SITE + "/academy/photography-exams-certification";

  var ARTICLE_MODULES = [
    { p: "/blog-on-photography/what-is-exposure-in-photography", t: "01 What Is Exposure In Photography" },
    { p: "/blog-on-photography/what-is-aperture-in-photography", t: "02 What Is Aperture In Photography" },
    { p: "/blog-on-photography/what-is-shutter-speed", t: "03 What Is Shutter Speed" },
    { p: "/blog-on-photography/what-is-iso-in-photography", t: "04 What Is Iso In Photography" },
    { p: "/blog-on-photography/what-is-manual-exposure-in-photography", t: "05 What Is Manual Exposure In Photography" },
    { p: "/blog-on-photography/what-is-metering-in-photography", t: "06 What Is Metering In Photography" },
    { p: "/blog-on-photography/exposure-bracketing-a-guide-for-photographers", t: "07 Exposure Bracketing A Guide For Photographers" },
    { p: "/blog-on-photography/what-is-focus-in-photography", t: "08 What Is Focus In Photography" },
    { p: "/blog-on-photography/what-is-depth-of-field", t: "09 What Is Depth Of Field" },
    { p: "/blog-on-photography/what-is-dynamic-range-in-photography", t: "10 What Is Dynamic Range In Photography" },
    { p: "/blog-on-photography/what-is-white-balance-in-photography", t: "11 What Is White Balance In Photography" },
    { p: "/blog-on-photography/what-are-camera-drive-modes", t: "12 What Are Camera Drive Modes" },
    { p: "/blog-on-photography/jpeg-vs-raw-the-key-differences", t: "13 Jpeg Vs Raw The Key Differences" },
    { p: "/blog-on-photography/full-frame-vs-cropped-sensor", t: "14 Full Frame Vs Cropped Sensor" },
    { p: "/blog-on-photography/what-is-focal-length-in-photography", t: "15 What Is Focal Length In Photography" },
    { p: "/blog-on-photography/tripod-for-cameras-essential-guide", t: "16 Tripod For Cameras Essential Guide" },
    { p: "/blog-on-photography/are-camera-uv-filters-worth-it", t: "17 Are Camera Uv Filters Worth It" },
    { p: "/blog-on-photography/10-basic-camera-settings-for-camera", t: "18 10 Basic Camera Settings For Camera" },
    { p: "/blog-on-photography/camera-sensor-cleaning-guide", t: "19 Camera Sensor Cleaning Guide" },
    { p: "/blog-on-photography/best-camera-bags-for-different-trips", t: "20 Best Camera Bags For Different Trips" },
    { p: "/blog-on-photography/what-do-camera-lens-filters-do", t: "21 What Do Camera Lens Filters Do" },
    { p: "/blog-on-photography/camera-lenses-hire-or-buy", t: "22 Camera Lenses Hire Or Buy" },
    { p: "/blog-on-photography/are-mirrorless-cameras-better-than-dslrs", t: "23 Are Mirrorless Cameras Better Than Dslrs" },
    { p: "/blog-on-photography/photo-editing-software", t: "24 Photo Editing Software" },
    { p: "/blog-on-photography/7-essential-camera-accessories", t: "25 7 Essential Camera Accessories" },
    { p: "/blog-on-photography/mastering-photography-composition-rules", t: "26 Mastering Photography Composition Rules" },
    { p: "/blog-on-photography/what-is-framing-in-photography", t: "27 What Is Framing In Photography" },
    { p: "/blog-on-photography/the-art-of-storytelling-photography", t: "28 The Art Of Storytelling Photography" },
    { p: "/blog-on-photography/what-are-leading-lines-in-photography", t: "29 What Are Leading Lines In Photography" },
    { p: "/blog-on-photography/what-is-negative-space-in-photography", t: "30 What Is Negative Space In Photography" },
    { p: "/blog-on-photography/what-is-contrast-in-photography", t: "31 What Is Contrast In Photography" },
    { p: "/blog-on-photography/finding-your-compositional-balance", t: "32 Finding Your Compositional Balance" },
    { p: "/blog-on-photography/photography-is-an-art-of-observation", t: "33 Photography Is An Art Of Observation" },
    { p: "/blog-on-photography/how-to-improve-your-photography-composition", t: "34 How To Improve Your Photography Composition" },
    { p: "/blog-on-photography/how-to-find-your-photography-style", t: "35 How To Find Your Photography Style" },
    { p: "/blog-on-photography/art-of-macro-photography", t: "36 Art Of Macro Photography" },
    { p: "/blog-on-photography/mastering-landscape-photography-tips-and-techniques", t: "37 Mastering Landscape Photography Tips And Techniques" },
    { p: "/blog-on-photography/product-photography-setup", t: "38 Product Photography Setup" },
    { p: "/blog-on-photography/what-is-minimalist-photography", t: "39 What Is Minimalist Photography" },
    { p: "/blog-on-photography/what-is-still-life-photography", t: "40 What Is Still Life Photography" },
    { p: "/blog-on-photography/how-to-take-long-exposure-photos", t: "41 How To Take Long Exposure Photos" },
    { p: "/blog-on-photography/architecture-photography-guide", t: "42 Architecture Photography Guide" },
    { p: "/blog-on-photography/what-is-portrait-photography", t: "43 What Is Portrait Photography" },
    { p: "/blog-on-photography/black-and-white-photography-for-beginners", t: "44 Black And White Photography For Beginners" },
    { p: "/blog-on-photography/street-photography-tips", t: "45 Street Photography Tips" }
  ];

  var EXAM_MODULE_IDS = [
    "module-01-exposure", "module-02-aperture", "module-03-shutter", "module-04-iso",
    "module-05-manual", "module-06-metering", "module-07-bracketing", "module-08-focusing",
    "module-09-dof", "module-10-drange", "module-11-wb", "module-12-drive",
    "module-13-jpeg-raw", "module-14-sensors", "module-15-focal"
  ];

  function findArticleIndex(path){
    for (var i = 0; i < ARTICLE_MODULES.length; i++) {
      if (ARTICLE_MODULES[i].p === path) return i;
    }
    return -1;
  }

  function examButtonLabel(title){
    var shortTitle = String(title || "")
      .replace(/\bWhat Is /gi, "")
      .replace(/\bWhat Are /gi, "");
    return "Take the " + shortTitle + " exam \u2192";
  }

  function wireNextModuleButtons(){
    var nextBtn = document.getElementById("ar-next-module-btn");
    var examBtn = document.getElementById("ar-take-exam-btn");
    if (!nextBtn || !examBtn || nextBtn.dataset.wired === "1") return;

    var idx = findArticleIndex(normalizePath(window.location.pathname));
    if (idx === -1) {
      nextBtn.classList.add("is-hidden");
      examBtn.classList.add("is-hidden");
      nextBtn.dataset.wired = "1";
      examBtn.dataset.wired = "1";
      return;
    }

    var nextSpan = nextBtn.querySelector("span");
    if (idx < 44) {
      var nextMod = ARTICLE_MODULES[idx + 1];
      nextBtn.href = SITE + nextMod.p;
      if (nextSpan) nextSpan.textContent = "Next: " + nextMod.t + " \u2192";
    } else {
      nextBtn.href = FOUNDATION_URL;
      if (nextSpan) nextSpan.textContent = "Foundation course home \u2192";
    }
    nextBtn.classList.remove("is-hidden");
    nextBtn.removeAttribute("aria-hidden");

    if (idx <= 14 && EXAM_MODULE_IDS[idx]) {
      var examSpan = examBtn.querySelector("span");
      var mod = ARTICLE_MODULES[idx];
      examBtn.href = EXAM_BASE + "?module=" + EXAM_MODULE_IDS[idx];
      if (examSpan && mod) examSpan.textContent = examButtonLabel(mod.t);
      examBtn.classList.remove("is-hidden");
      examBtn.removeAttribute("aria-hidden");
    } else {
      examBtn.classList.add("is-hidden");
    }

    nextBtn.dataset.wired = "1";
    examBtn.dataset.wired = "1";
  }

  function findInsertPoint(){
    var h1 =
      document.querySelector('main h1') ||
      document.querySelector('article h1') ||
      document.querySelector('h1');
    if (h1 && h1.parentElement) return { mode: "after-h1", el: h1 };

    var main =
      document.querySelector('main') ||
      document.querySelector('#page') ||
      document.querySelector('body');
    return main ? { mode: "prepend", el: main } : null;
  }

  function moveWidgetOnce(){
    var w = document.getElementById('ar-bookmark-widget');
    if (!w) return false;
    if (w.dataset.moved === "1") return true;

    var target = findInsertPoint();
    if (!target) return false;

    if (target.mode === "after-h1") target.el.insertAdjacentElement('afterend', w);
    else target.el.insertAdjacentElement('afterbegin', w);

    w.dataset.moved = "1";
    return true;
  }

  async function waitForMemberstack(){
    var start = Date.now();
    while (!window.$memberstackDom){
      if (Date.now() - start > 8000) return null;
      await new Promise(r => setTimeout(r, 100));
    }
    return window.$memberstackDom;
  }

  async function wireBookmark(){
    var btn = document.getElementById('bookmark-btn');
    if (!btn || btn.dataset.wired === "1") return;

    btn.addEventListener('click', async () => {
      btn.querySelector('span').textContent = "Saving...";

      const ms = await waitForMemberstack();
      if (!ms) { btn.querySelector('span').textContent = "Try again"; return; }

      // Memberstack JSON is sometimes nested; handle both shapes safely
      const mj = await ms.getMemberJSON();
      const root = (mj && typeof mj === "object" && mj.data) ? mj.data : mj;
      const memberJson = (root && root.data && typeof root.data === "object") ? root.data : (root || {});

      let bookmarks = Array.isArray(memberJson.bookmarks) ? memberJson.bookmarks : [];

      const page = { title: document.title, url: normAbsUrl() };

      if (!bookmarks.find(b => (b && b.url) === page.url)) {
        bookmarks.push(page);
        if (bookmarks.length > 20) bookmarks = bookmarks.slice(bookmarks.length - 20);

        memberJson.bookmarks = bookmarks;

        // Write back preserving wrapper if present
        if (root && root.data && typeof root.data === "object") root.data = memberJson;

        await ms.updateMemberJSON({ json: (mj && mj.data) ? mj : memberJson });

        btn.style.background = "#28a745";
        btn.querySelector('span').textContent = "Bookmarked!";
      } else {
        btn.querySelector('span').textContent = "Already Bookmarked";
      }
    });

    btn.dataset.wired = "1";
  }

  // Use MutationObserver so it doesn't "flash then vanish" when Sqsp reflows content
  function init(){
    moveWidgetOnce();
    wireBookmark();
    wireNextModuleButtons();

    var obs = new MutationObserver(function(){
      moveWidgetOnce();
      wireBookmark();
      wireNextModuleButtons();
    });

    obs.observe(document.documentElement, { childList:true, subtree:true });

    // Stop observing after 15s (prevents any performance issues)
    setTimeout(function(){ obs.disconnect(); }, 15000);
  }

  if (document.readyState === "loading") {
    document.addEventListener("DOMContentLoaded", init);
  } else {
    init();
  }
})();
</script>
