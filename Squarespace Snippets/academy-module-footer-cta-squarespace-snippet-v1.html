<style id="ar-module-footer-cta-style">
  #ar-module-footer-cta{

  .ar-footer-cta--guest{

  }
  .ar-footer-cta--guest .ar-footer-cta__logo{
    width:46px;
    height:46px;
    object-fit:contain;
    display:block;
    margin:0 auto 16px;
  }
  .ar-footer-cta--guest .ar-footer-cta__eyebrow{
    margin:0 0 12px;
    font-size:12px;
    font-weight:800;
    letter-spacing:0.06em;
    text-transform:uppercase;
    color:#e6c067;
    line-height:1.4;
  }
  .ar-footer-cta--guest .ar-footer-cta__headline{
    margin:0 0 18px;
    font-size:22px;
    font-weight:500;
    color:#f4f4f4;
    line-height:1.35;
  }
  .ar-footer-cta--guest .ar-footer-cta__bullets{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:8px 20px;
    margin:0 0 22px;
    padding:0;
    list-style:none;
  }
  .ar-footer-cta--guest .ar-footer-cta__bullets li{
    font-size:13px;
    color:#d4d4d4;
    line-height:1.4;
  }
  .ar-footer-cta--guest .ar-footer-cta__bullets li::before{
    content:"\2713 ";
    color:#c79a3b;
    font-weight:800;
  }
  .ar-footer-cta--guest .ar-footer-cta__cta{
    display:inline-block;
    padding:13px 30px;
    border-radius:8px;
    border:none;
    background:#e6be6a;
    color:#1a1305;
    font-size:15px;
    font-weight:500;
    line-height:1.2;
    text-decoration:none;
  }
  .ar-footer-cta--guest .ar-footer-cta__cta:hover{
    background:#b8860b;
    color:#1a1305;
  }
  .ar-footer-cta--guest .ar-footer-cta__reassure{
    margin:14px 0 0;
    font-size:12px;
    color:#8a8a8a;
    line-height:1.4;
  }

  .ar-footer-cta--member{
    background:#0e0e0e;
    border:1px solid #c79a3b;
    border-radius:14px;
    padding:24px 28px;
    box-sizing:border-box;
  }
  .ar-footer-cta--member .ar-footer-cta__top{
    display:flex;
    align-items:flex-start;
    gap:14px 16px;
    margin-bottom:18px;
  }
  .ar-footer-cta--member .ar-footer-cta__logo{
    width:34px;
    height:34px;
    object-fit:contain;
    flex:0 0 auto;
  }
  .ar-footer-cta--member .ar-footer-cta__head{
    flex:1 1 200px;
    min-width:0;
  }
  .ar-footer-cta--member .ar-footer-cta__title{
    margin:0 0 6px;
    font-size:18px;
    font-weight:500;
    color:#ffffff;
    line-height:1.35;
    display:flex;
    align-items:center;
    flex-wrap:wrap;

  }
  .ar-footer-cta__title-tick{
    display:inline-flex;
    align-items:center;
    justify-content:center;
    flex:0 0 auto;
    line-height:0;
  }
  .ar-footer-cta__title-tick svg{
    width:22px;
    height:22px;
    display:block;
    filter:drop-shadow(0 1px 2px rgba(0,0,0,0.25));
  }
  .ar-footer-cta--member .ar-footer-cta__subtitle{
    margin:0;
    font-size:13px;
    color:#b8b8b8;
    line-height:1.45;
  }
  .ar-footer-cta__stats{
    display:flex;
    flex-wrap:nowrap;
    gap:10px;
    margin-bottom:16px;
  }
  .ar-footer-cta__stat{
    flex:1 1 0;
    min-width:0;
    text-align:center;
    background:#161310;
    border:1px solid #3a3328;
    border-radius:10px;
    padding:13px 16px;
  }
  .ar-footer-cta__stat-label{
    margin:0 0 6px;
    font-size:11px;
    font-weight:500;
    letter-spacing:0.05em;
    text-transform:uppercase;
    color:#E57200;
    line-height:1.3;
  }
  .ar-footer-cta__stat-value{
    margin:0;
    font-size:26px;
    font-weight:500;
    color:#ffffff;
    line-height:1.15;
  }
  .ar-footer-cta__stat-denom{
    font-size:15px;
    font-weight:500;
    color:#888888;
  }
  .ar-footer-cta__stats.is-loading .ar-footer-cta__stat-value{
    visibility:hidden;
    min-height:29px;
  }
  .ar-footer-cta__progress{
    margin-bottom:18px;
  }
  .ar-footer-cta__progress-head{
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:12px;
    margin-bottom:8px;
  }
  .ar-footer-cta__progress-label{
    margin:0;
    font-size:12px;
    color:#b8b8b8;
  }
  .ar-footer-cta__progress-pct{
    margin:0;
    font-size:12px;
    font-weight:500;
    color:#E57200;
  }
  .ar-footer-cta__progress-track{
    height:8px;
    border-radius:4px;
    background:rgba(255,255,255,0.12);
    overflow:hidden;
  }
  .ar-footer-cta__progress-fill{
    height:100%;
    background:#E57200;
    border-radius:4px;
    width:0;
    transition:width 0.25s ease;
  }
  .ar-footer-cta__progress.is-loading .ar-footer-cta__progress-pct,
  .ar-footer-cta__progress.is-loading .ar-footer-cta__progress-fill{
    visibility:hidden;
  }
  .ar-footer-cta--member .ar-footer-cta__actions{
    display:flex;
    flex-direction:column;
    flex-wrap:nowrap;
    gap:10px;
  }
  .ar-footer-cta--member .ar-footer-cta__btn{
    width:100%;
  }
  .ar-footer-cta__btn{
    display:inline-flex;
    align-items:center;
    justify-content:center;
    padding:13px 18px;
    border-radius:8px;
    font-size:14px;
    font-weight:500;
    line-height:1.2;
    text-decoration:none;
    white-space:normal;
    text-align:center;
  }
  .ar-footer-cta__btn--next{
    background:#E57200;
    border:2px solid #E57200;
    color:#ffffff;
  }
  .ar-footer-cta__btn--next:hover{ background:#cc6500; border-color:#cc6500; color:#ffffff; }
  .ar-footer-cta__btn--exam{
    background:transparent;
    border:1px solid #c79a3b;
    color:#e6c067;
  }
  .ar-footer-cta__btn--exam:hover{ background:rgba(199,154,59,0.12); color:#e6c067; }
  .ar-footer-cta__btn--dash{
    background:#166534;
    border:2px solid #14532d;
    color:#ffffff;
  }
  .ar-footer-cta__btn--dash:hover{ background:#15803d; border-color:#14532d; color:#ffffff; }
  .ar-footer-cta__btn.is-hidden{ display:none !important; }

  @media (max-width:900px){
    #ar-module-footer-cta.ar-footer-cta--member{
      width:100%;
      max-width:640px;
      min-width:0;
    }
  }
</style>

  var SIGNUP_CTA_COPY = "Get all 60 modules + certificates - free \u2192";

  function normalizePath(url){
    if (!url || typeof url !== "string") return "/";
    var path = url;
    if (path.indexOf("http://") === 0 || path.indexOf("https://") === 0) {
      try { path = new URL(path).pathname; } catch (e) {
        var m = path.match(/https?:\/\/[^/]+(\/.*)/);
        if (m) path = m[1];
      }
    }
    path = path.split("?")[0].split("#")[0];
    path = path.replace(/\/+$/, "") || "/";
    if (path.charAt(0) !== "/") path = "/" + path;
    return path;
  }

  function waitForGlobal(name, timeout){
    timeout = timeout || 8000;
    return new Promise(function(resolve){
      var start = Date.now();
      (function poll(){
        if (globalThis[name]) return resolve(globalThis[name]);
        if (Date.now() - start > timeout) return resolve(null);
        setTimeout(poll, 80);
      })();
    });
  }

  var API_BASE = "https://alanranger-modules.vercel.app";
  var PROGRESS_URL = API_BASE + "/api/exams/progress";
  var MODULES_TOTAL = 60;
  var EXAMS_TOTAL = 15;

  var PDF_ASSIGNMENT_PATHS = [
    "/s/Photography-Practice-Assignment-depth-of-field.pdf",

    "/s/THE-SEASONS-photography-Assignment.pdf"
  ];

  function buildOpenedSet(normalized){
    var opened = (normalized && normalized.arAcademy && normalized.arAcademy.modules && normalized.arAcademy.modules.opened) || {};
    var set = new Set();
    Object.keys(opened).forEach(function(key){
      var p = normalizePath(key);
      if (p) set.add(p);
    });
    return set;
  }

  function countOpenedModules(normalized, nav){
    var opened = (normalized && normalized.arAcademy && normalized.arAcademy.modules && normalized.arAcademy.modules.opened) || {};
    var set = new Set();
    var paths = nav.articleModules.map(function(m){ return m.p; }).concat(PDF_ASSIGNMENT_PATHS);
    Object.keys(opened).forEach(function(key){
      var p = normalizePath(key);
      for (var i = 0; i < paths.length; i++) {
        if (paths[i] === p) { set.add(p); break; }
      }
    });
    return set.size;
  }

  function findNextUnopenedModule(nav, openedSet, currentIdx){
    var mods = nav.articleModules;
    if (!mods || !mods.length) return null;
    var start = currentIdx >= 0 ? currentIdx + 1 : 0;
    var i;
    for (i = start; i < mods.length; i++) {
      if (!openedSet.has(mods[i].p)) return mods[i];
    }
    for (i = 0; i < mods.length; i++) {
      if (currentIdx >= 0 && i > currentIdx) break;
      if (!openedSet.has(mods[i].p)) return mods[i];
    }
    return null;
  }

  function allArticleModulesOpened(nav, openedSet){
    for (var i = 0; i < nav.articleModules.length; i++) {
      if (!openedSet.has(nav.articleModules[i].p)) return false;
    }
    return true;
  }

  async function fetchExamProgress(memberId){
    if (!memberId) return null;
    try {
      var res = await fetch(PROGRESS_URL, {
        headers: { "X-Memberstack-Id": memberId },
        credentials: "omit"
      });
      if (!res.ok) return null;
      return await res.json();
    } catch (e) {
      return null;
    }
  }

  function passedExamCount(progressData){
    var n = 0;
    var mods = progressData && Array.isArray(progressData.modules) ? progressData.modules : [];
    mods.forEach(function(m){
      if (m && m.status === "passed") n++;
    });
    if (n === 0 && progressData && progressData.summary && typeof progressData.summary.passedCount === "number") {
      n = progressData.summary.passedCount;
    }
    return n;
  }

  function updateMemberStats(el, modulesOpened, examsPassed){
    var stats = el.querySelector("#ar-footer-cta-stats");
    var progress = el.querySelector("#ar-footer-cta-progress");
    var modEl = el.querySelector("#ar-footer-stat-modules");
    var examEl = el.querySelector("#ar-footer-stat-exams");
    var pctEl = el.querySelector("#ar-footer-progress-pct");
    var fillEl = el.querySelector("#ar-footer-progress-fill");
    var pct = Math.round((modulesOpened / MODULES_TOTAL) * 100);
    if (modEl) modEl.innerHTML = modulesOpened + ' <span class="ar-footer-cta__stat-denom">/ ' + MODULES_TOTAL + '</span>';
    if (examEl) examEl.innerHTML = examsPassed + ' <span class="ar-footer-cta__stat-denom">/ ' + EXAMS_TOTAL + '</span>';
    if (pctEl) pctEl.textContent = pct + "%";
    if (fillEl) fillEl.style.width = pct + "%";
    if (stats) stats.classList.remove("is-loading");
    if (progress) progress.classList.remove("is-loading");
  }

  function updateMemberActions(el, nav, idx, openedSet){
    var actions = el.querySelector("#ar-footer-cta-actions");
    if (!actions || !nav) return;
    var nextHtml = "";
    var examHtml = "";
    var nextMod = findNextUnopenedModule(nav, openedSet, idx);
    if (nextMod) {
      nextHtml = '<a class="ar-footer-cta__btn ar-footer-cta__btn--next" href="' + SITE + nextMod.p + '">Next: ' + nextMod.t + ' \u2192</a>';
    } else if (allArticleModulesOpened(nav, openedSet)) {
      nextHtml = '<a class="ar-footer-cta__btn ar-footer-cta__btn--next" href="' + FOUNDATION_URL + '">Foundation course home \u2192</a>';
    }
    if (idx >= 0 && idx <= 14 && nav.examModuleIds[idx]) {
      var mod = nav.articleModules[idx];
      var examLabel = nav.examButtonLabel(mod.t);
      examHtml = '<a class="ar-footer-cta__btn ar-footer-cta__btn--exam" href="' + EXAM_BASE + "?module=" + nav.examModuleIds[idx] + '">' + examLabel + '</a>';
    }
    actions.innerHTML = nextHtml + examHtml +
      '<a class="ar-footer-cta__btn ar-footer-cta__btn--dash" href="' + DASHBOARD_URL + '">Dashboard \u2192</a>';
  }

  async function hydrateMemberPanel(el, nav, idx, ctx, accessApi){
    var memberId = ctx.memberId || "";
    if (!ctx.normalized || !ctx.normalized.arAcademy) {
      try {
        var ms = await accessApi.waitForMemberstack();
        if (ms && globalThis.__arMsReader) {
          var bundle = await globalThis.__arMsReader.fetchBundle(ms);
          ctx.normalized = bundle.memberJson || ctx.normalized || {};
          if (!memberId && bundle.member) {
            memberId = bundle.member.id || (bundle.member.data && bundle.member.data.id) || "";
          }
        }
      } catch (e) { /* ignore */ }
    }
    var openedSet = buildOpenedSet(ctx.normalized || {});
    updateMemberActions(el, nav, idx, openedSet);
    var progressData = await fetchExamProgress(memberId);
    var modulesOpened = countOpenedModules(ctx.normalized || {}, nav);
    var examsPassed = passedExamCount(progressData);
    updateMemberStats(el, modulesOpened, examsPassed);
  }

  function renderGuestPanel(el){
    el.className = "ar-footer-cta--guest";
    el.innerHTML =
      '<img class="ar-footer-cta__logo" src="' + LOGO_WHITE + '" alt="Alan Ranger Photography Academy" loading="lazy">' +
      '<p class="ar-footer-cta__eyebrow">\uD83D\uDD12 You\'ve reached the end of this free module</p>' +

      '<ul class="ar-footer-cta__bullets">' +
      '<li>60 step-by-step modules</li><li>15 exams + certificates</li>' +

      '<p class="ar-footer-cta__reassure">Free 14-day trial. No card needed.</p>';
  }

  async function initFooter(){
    var el = document.getElementById("ar-module-footer-cta");
    if (!el || el.dataset.rendered === "1") return;

    var nav = await waitForGlobal("__arAcademyModuleNav", 8000);
    var accessApi = await waitForGlobal("__arAcademyMemberAccess", 8000);
    var idx = nav ? nav.findArticleIndex(normalizePath(window.location.pathname)) : -1;

    var hasAccess = false;
    var ctx = { member: null, memberId: "", idSource: "none", normalized: {} };
    if (accessApi) {
      var ms = await accessApi.waitForMemberstack();
      if (ms) {
        try { ctx = await accessApi.resolveMemberIdentity(ms); } catch (e) { /* ignore */ }
      }
      var access = accessApi.evaluateAccess(ctx.member, ctx);
      hasAccess = !!(access && access.loggedIn && access.hasAccess);
    }

    if (hasAccess && nav) {
      renderMemberShell(el, nav, idx);
      el.dataset.rendered = "1";
      hydrateMemberPanel(el, nav, idx, ctx, accessApi);
    } else if (hasAccess) {
      renderMemberShell(el, { articleModules: [], examModuleIds: [], examButtonLabel: function(t){ return "Take the exam \u2192"; } }, idx);
      el.dataset.rendered = "1";
    } else {
      renderGuestPanel(el);
      el.dataset.rendered = "1";
    }
  }

  function boot(){
    initFooter();
  }

  if (document.readyState === "loading") {
    document.addEventListener("DOMContentLoaded", boot);
  } else {
    boot();
  }
  setTimeout(initFooter, 1200);
})();
