};

var KEEPALIVE_DECAY_DAYS = 60;



function safeNum(value, fallback) {
  return typeof value === "number" && !Number.isNaN(value) ? value : fallback;
}

function normaliseStats(raw) {
  var stats = raw || {};
  return {
    foundationModulesOpened: safeNum(stats.foundationModulesOpened, 0),
    cameraOpened: safeNum(stats.cameraOpened, 0),
    compositionOpened: safeNum(stats.compositionOpened, 0),
    pdfAssignmentsOpened: safeNum(stats.pdfAssignmentsOpened, 0),
    totalModulesOpened: safeNum(stats.totalModulesOpened, 0),
    examsPassed: safeNum(stats.examsPassed, 0),
    appliedLearningOpened: stats.appliedLearningOpened == null ? null : safeNum(stats.appliedLearningOpened, 0),
    practicePacksOpened: stats.practicePacksOpened == null ? null : safeNum(stats.practicePacksOpened, 0),
    distinctActiveMonthsAllTime:
      stats.distinctActiveMonthsAllTime == null ? null : safeNum(stats.distinctActiveMonthsAllTime, 0),
  };
}

function isFoundationGateEarned(modulesOpened, activeDays, engagementDegraded) {
  if (modulesOpened < FOUNDATION_GATE.minModules) return false;
  if (engagementDegraded) return true;
  return safeNum(activeDays, 0) >= FOUNDATION_GATE.minActiveDays;
}

function isPractitionerGateEarned(stats) {
  if (PRACTITIONER_GATE.requireAllCamera && stats.cameraOpened < CAMERA_MODULE_PATHS.length) {
    return false;
  }
  if (
    PRACTITIONER_GATE.requireAllComposition &&
    stats.compositionOpened < COMPOSITION_MODULE_PATHS.length
  ) {
    return false;
  }
  if (stats.pdfAssignmentsOpened < PRACTITIONER_GATE.minPdfAssignments) return false;
  if (stats.examsPassed < PRACTITIONER_GATE.minExamsPassed) return false;
  return true;
}

function isCertifiedGateEarned(stats) {
  if (CERTIFIED_GATE.requireAllExamsPassed && stats.examsPassed < 15) return false;
  if (stats.totalModulesOpened < CERTIFIED_GATE.minModulesOpened) return false;
  return true;
}

function isLongevityDegraded(stats) {
  var safe = normaliseStats(stats);
  return (
    safe.appliedLearningOpened == null ||
    safe.practicePacksOpened == null ||
    safe.distinctActiveMonthsAllTime == null
  );
}

function computeLongevityPoints(stats) {
  var safe = normaliseStats(stats);
  return (
    safe.appliedLearningOpened * POINTS_WEIGHTS.appliedLearning +
    safe.practicePacksOpened * POINTS_WEIGHTS.practicePack +
    safe.pdfAssignmentsOpened * POINTS_WEIGHTS.pdfAssignment +
    safe.distinctActiveMonthsAllTime * POINTS_WEIGHTS.activeMonth
  );
}

function warnLongevityDegraded() {
  if (console.warn) {
    console.warn("[badge-gates] engagementDegraded: Graduate/Master blocked (longevity fields missing)");
  }
}

function isGraduateGateEarned(stats, hasConverted, engagementDegraded) {
  if (!hasConverted) return false;
  if (engagementDegraded || isLongevityDegraded(stats)) {
    warnLongevityDegraded();
    return false;
  }
  return computeLongevityPoints(stats) >= GRADUATE_GATE.minPoints;
}

function isMasterGateEarned(stats, hasConverted, graduateEarned, engagementDegraded) {
  if (!graduateEarned || !hasConverted) return false;
  if (engagementDegraded || isLongevityDegraded(stats)) {
    warnLongevityDegraded();
    return false;
  }
  return computeLongevityPoints(stats) >= MASTER_GATE.minPoints;
}

function daysSinceActivity(lastActivityAt, nowMs) {
  if (!lastActivityAt) return Infinity;
  var t = new Date(lastActivityAt).getTime();
  if (Number.isNaN(t)) return Infinity;
  var DAY_MS_LOCAL = 86400000;
  return Math.floor((nowMs - t) / DAY_MS_LOCAL);
}

function isSummitBadgePaused(earned, badgeKey, lastActivityAt, nowMs) {
  if (!earned || (badgeKey !== "graduate" && badgeKey !== "master")) return false;
  return daysSinceActivity(lastActivityAt, nowMs) >= KEEPALIVE_DECAY_DAYS;
}

function isStageConditionsMet(stage, stats, activeDays, engagementDegraded, gateContext) {
  var ctx = gateContext || {};
  var hasConverted = ctx.hasConverted === true;
  var graduateEarned = ctx.graduateEarned === true;

  if (stage.alwaysEarned) return true;
  if (stage.foundationGate) {
    return isFoundationGateEarned(stats.foundationModulesOpened, activeDays, engagementDegraded);
  }
  if (stage.practitionerGate) return isPractitionerGateEarned(stats);
  if (stage.certifiedGate) return isCertifiedGateEarned(stats);
  if (stage.graduateGate) return isGraduateGateEarned(stats, hasConverted, engagementDegraded);
  if (stage.masterGate) return isMasterGateEarned(stats, hasConverted, graduateEarned, engagementDegraded);
  if (stage.minExams) return stats.examsPassed >= stage.minExams;
  return false;
}

function computeJourneyBadges(stats, activeDays, engagementDegraded, gateContext) {
  var safeStats = normaliseStats(stats);
  var safeDays = safeNum(activeDays, 0);
  var degraded = engagementDegraded === true;
  var ctx = gateContext || {};
  var nowMs = typeof ctx.nowMs === "number" ? ctx.nowMs : Date.now();
  var canEarnHigher = true;
  var graduateEarned = false;

  return JOURNEY_STAGES.map(function(stage){
    var earned = false;
    var stageCtx = Object.assign({}, ctx, { graduateEarned });
    if (canEarnHigher) {
      earned = isStageConditionsMet(stage, safeStats, safeDays, degraded, stageCtx);
      if (!earned) canEarnHigher = false;
    }
    if (stage.key === "graduate" && earned) graduateEarned = true;
    var paused = isSummitBadgePaused(earned, stage.key, ctx.lastActivityAt, nowMs);
    return {
      key: stage.key,
      label: stage.label,
      earned,
      paused: paused === true,
      colour: stage.colour,
      stars: stage.stars,
      iconClass: stage.iconClass,
      sublabel: stage.sublabel,
    };
  });
}

function getHighestConsecutiveEarned(badges) {
  var current = badges[0];
  for (var i = 0; i < badges.length; i += 1) {
    if (badges[i].earned) current = badges[i];
    else break;
  }
  return current;
}

function getCurrentStage(badges) {
  var current = getHighestConsecutiveEarned(badges);
  return {
    key: current.key,
    label: current.label,
    levelIndex: JOURNEY_STAGES.findIndex(function(s){ return s.key === current.key; }) + 1,
    levelTotal: JOURNEY_STAGES.length,
    colour: current.colour,
    stars: current.stars,
    iconClass: current.iconClass,
    sublabel: current.sublabel,
    paused: current.paused === true,
  };
}

function getNextUnearnedBadge(badges) {
  for (var i = 0; i < badges.length; i += 1) {
    if (!badges[i].earned) return badges[i];
  }
  return null;
}

function practitionerRequirementsMet(stats) {
  var safeStats = normaliseStats(stats);
  var total = 4;
  var met = 0;
  if (!PRACTITIONER_GATE.requireAllCamera || safeStats.cameraOpened >= CAMERA_MODULE_PATHS.length) {
    met += 1;
  }
  if (
    !PRACTITIONER_GATE.requireAllComposition ||
    safeStats.compositionOpened >= COMPOSITION_MODULE_PATHS.length
  ) {
    met += 1;

  if (safeStats.pdfAssignmentsOpened >= PRACTITIONER_GATE.minPdfAssignments) met += 1;
  if (safeStats.examsPassed >= PRACTITIONER_GATE.minExamsPassed) met += 1;
  return { met, total };
}

function graduateRequirementsMet(stats) {
  var safe = normaliseStats(stats);
  var targets = GRADUATE_TARGETS;
  var rows = [
    { key: "appliedLearning", current: safe.appliedLearningOpened, target: targets.appliedLearning },
    { key: "practicePacks", current: safe.practicePacksOpened, target: targets.practicePacks },
    { key: "pdfAssignments", current: safe.pdfAssignmentsOpened, target: targets.pdfAssignments },
    { key: "activeMonths", current: safe.distinctActiveMonthsAllTime, target: targets.activeMonths },
  ];
  var met = 0;
  rows.forEach(function(row){
    if (row.current != null && row.current >= row.target) met += 1;
  });
  return { met, total: rows.length, rows, targets };
}

function masterRequirementsMet(stats) {
  var safe = normaliseStats(stats);
  var targets = MASTER_TARGETS;
  var rows = [
    { key: "appliedLearning", current: safe.appliedLearningOpened, target: targets.appliedLearning },
    { key: "practicePacks", current: safe.practicePacksOpened, target: targets.practicePacks },
    { key: "pdfAssignments", current: safe.pdfAssignmentsOpened, target: targets.pdfAssignments },
    { key: "activeMonths", current: safe.distinctActiveMonthsAllTime, target: targets.activeMonths },
  ];
  var met = 0;
  rows.forEach(function(row){
    if (row.current != null && row.current >= row.target) met += 1;

function componentRatio(current, target) {
  if (target <= 0) return 100;
  var val = current == null ? 0 : current;
  return Math.min(100, (val / target) * 100);
}

function computeNextBadgeProgress(badges, stats, activeDays, engagementDegraded, openedCount, modulesTotal) {
  var safe = normaliseStats(stats);
  var next = getNextUnearnedBadge(badges);
  var modTotal = typeof modulesTotal === "number" && modulesTotal > 0 ? modulesTotal : 60;

  if (!next) {
    return { pct: 100, label: "100% - all badges earned", degraded: false, nextKey: null, breakdown: null };
  }

  if ((next.key === "graduate" || next.key === "master") && isLongevityDegraded(stats)) {
    var pct = Math.round((safeNum(openedCount, 0) / modTotal) * 100);
    return { pct, label: `${pct}% of the foundations course`, degraded: true, nextKey: next.key, breakdown: null };
  }

  var ratios = [];
  var breakdown = null;
  if (next.key === "foundation") {
    var moduleRatio = componentRatio(safe.foundationModulesOpened, FOUNDATION_GATE.minModules);
    if (!engagementDegraded) {
      var daysRatio = componentRatio(safeNum(activeDays, 0), FOUNDATION_GATE.minActiveDays);
      var pct = Math.round(moduleRatio * 0.8 + daysRatio * 0.2);
      var mod = Math.min(safeNum(safe.foundationModulesOpened, 0), FOUNDATION_GATE.minModules);
      var days = Math.min(safeNum(activeDays, 0), FOUNDATION_GATE.minActiveDays);
      breakdown = `Foundation: ${mod}/${FOUNDATION_GATE.minModules} modules · ${days}/${FOUNDATION_GATE.minActiveDays} active days`;
      return { pct, label: `${pct}% to ${next.label}`, degraded: false, nextKey: next.key, breakdown };
    }
    var pct = Math.round(moduleRatio);
    return { pct, label: `${pct}% to ${next.label}`, degraded: false, nextKey: next.key, breakdown: null };
  } else if (next.key === "practitioner") {
    ratios.push(componentRatio(safe.cameraOpened, CAMERA_MODULE_PATHS.length));
    ratios.push(componentRatio(safe.compositionOpened, COMPOSITION_MODULE_PATHS.length));
    ratios.push(componentRatio(safe.pdfAssignmentsOpened, PRACTITIONER_GATE.minPdfAssignments));
    ratios.push(componentRatio(safe.examsPassed, PRACTITIONER_GATE.minExamsPassed));
  } else if (next.key === "certified") {
    ratios.push(componentRatio(safe.examsPassed, 15));
    ratios.push(componentRatio(safe.totalModulesOpened, CERTIFIED_GATE.minModulesOpened));
  } else if (next.key === "graduate") {
    ratios.push(componentRatio(safe.appliedLearningOpened, GRADUATE_TARGETS.appliedLearning));
    ratios.push(componentRatio(safe.practicePacksOpened, GRADUATE_TARGETS.practicePacks));
    ratios.push(componentRatio(safe.pdfAssignmentsOpened, GRADUATE_TARGETS.pdfAssignments));
    ratios.push(componentRatio(safe.distinctActiveMonthsAllTime, GRADUATE_TARGETS.activeMonths));
  } else if (next.key === "master") {
    ratios.push(componentRatio(safe.appliedLearningOpened, MASTER_TARGETS.appliedLearning));
    ratios.push(componentRatio(safe.practicePacksOpened, MASTER_TARGETS.practicePacks));
    ratios.push(componentRatio(safe.pdfAssignmentsOpened, MASTER_TARGETS.pdfAssignments));
    ratios.push(componentRatio(safe.distinctActiveMonthsAllTime, MASTER_TARGETS.activeMonths));
  }

  var pct = ratios.length
    ? Math.round(ratios.reduce((sum, ratio) => sum + ratio, 0) / ratios.length)
    : Math.round((safeNum(openedCount, 0) / modTotal) * 100);
  return { pct, label: `${pct}% to ${next.label}`, degraded: false, nextKey: next.key, breakdown: null };
}

function computeTrackFillPct(badges, progressPct) {
  if (!badges || !badges.length) return 0;
  var segmentCount = badges.length - 1;
  if (segmentCount <= 0) return 100;
  if (!getNextUnearnedBadge(badges)) return 100;
  var lastEarnedIdx = -1;
  for (var i = 0; i < badges.length; i += 1) {
    if (badges[i].earned) lastEarnedIdx = i;
    else break;
  }
  var fillUnits = lastEarnedIdx + safeNum(progressPct, 0) / 100;
  return Math.min(100, Math.round((fillUnits / segmentCount) * 100));
}

  function normalizePath(url){

    if (!url || typeof url !== "string") return "/";

    var path = url;

    if (path.indexOf("http://") === 0 || path.indexOf("https://") === 0) {

      try { path = new URL(path).pathname; } catch (e) {

        var m = path.match(/https?:\/\/[^/]+(\/.*)/);

        if (m) path = m[1];

      }

    }

    path = path.split("?")[0].split("#")[0];

    path = path.replace(/\/+$/, "") || "/";

    if (path.charAt(0) !== "/") path = "/" + path;

    return path;

  }

  function parseExamProgress(progressData){

    var statusMap = {};

    var source = "none";

    var examsPassed = 0;

    var nextExamModuleId = null;

    var hasData = false;



    EXAM_MODULE_IDS.forEach(function(id){ statusMap[id] = "not_taken"; });



    if (progressData && Array.isArray(progressData.modules) && progressData.modules.length) {

      hasData = true;

      progressData.modules.forEach(function(m){

        if (!m || !m.moduleId) return;

        if (EXAM_MODULE_IDS.indexOf(m.moduleId) === -1) return;

        statusMap[m.moduleId] = m.status || "not_taken";

      });

      examsPassed = EXAM_MODULE_IDS.filter(function(id){ return statusMap[id] === "passed"; }).length;

      source = "modules-count";

    } else if (progressData && progressData.summary && typeof progressData.summary.passedCount === "number") {

      hasData = true;

      examsPassed = Math.min(15, Math.max(0, progressData.summary.passedCount));

      source = "summary.passedCount";

    }



    if (source === "modules-count") {

      for (var i = 0; i < EXAM_MODULE_IDS.length; i++) {

        if (statusMap[EXAM_MODULE_IDS[i]] !== "passed") {

          nextExamModuleId = EXAM_MODULE_IDS[i];

          break;

        }

      }

    }



    return {

      statusMap: statusMap,

      examsPassed: examsPassed,

      nextExamModuleId: nextExamModuleId,

      source: source,

      hasData: hasData,

      hasModuleStatus: source === "modules-count"

    };

  }



  function firstUnpassedExam(statusMap){

    for (var i = 0; i < EXAM_MODULE_IDS.length; i++) {

      var id = EXAM_MODULE_IDS[i];

      if (statusMap[id] !== "passed") return { idx: i, id: id };

    }

    return null;

  }



  function shortArticleTitle(t){

  function examNum(idx){ return String(idx + 1).padStart(2, "0"); }



  function pluralWord(n, singular, plural){

    return n === 1 ? singular : plural;

  }



  function formatFoundationProximity(modulesOpened, activeDays, engagementDegraded){

    var modShort = Math.max(0, FOUNDATION_GATE.minModules - modulesOpened);

    if (engagementDegraded) {

      if (!modShort) return "";

      return modShort === 1 ? "Open 1 more module to earn Foundation" : "Open " + modShort + " more modules to earn Foundation";

    }

    var dayShort = Math.max(0, FOUNDATION_GATE.minActiveDays - activeDays);

    if (!modShort && !dayShort) return "";

    if (modShort && dayShort) {

      return "You're " + dayShort + " " + pluralWord(dayShort, "day", "days") +

        " and " + modShort + " " + pluralWord(modShort, "module", "modules") +

        " from your Foundation badge";

    }

    if (modShort) {

      return modShort === 1 ? "Open 1 more module to earn Foundation" : "Open " + modShort + " more modules to earn Foundation";

    }

    return dayShort === 1 ? "1 more active day to earn Foundation" : dayShort + " more active days to earn Foundation";

  }



  function formatPractitionerProximity(stats){

    var r = practitionerRequirementsMet(stats);

    if (r.met >= r.total) return "";

    if (r.met === 1) return "1 of " + r.total + " requirements complete for Practitioner";

    return r.met + " of " + r.total + " requirements complete for Practitioner";

  }



  function formatGraduateProximity(stats){

    var r = graduateRequirementsMet(stats);

    if (r.met >= r.total) return "";

    if (r.met === 1) return "1 of " + r.total + " requirements complete for Graduate";

    return r.met + " of " + r.total + " requirements complete for Graduate";

  }



  function formatMasterProximity(stats){

    var r = masterRequirementsMet(stats);

    if (r.met >= r.total) return "";

    if (r.met === 1) return "1 of " + r.total + " requirements complete for Master";

    return r.met + " of " + r.total + " requirements complete for Master";

  }



  function formatCertifiedProximity(stats){

    var parts = [];

    if (stats.examsPassed < 15) {

      var examLeft = 15 - stats.examsPassed;

      parts.push(examLeft + " " + pluralWord(examLeft, "exam", "exams"));

    }

    if (stats.totalModulesOpened < CERTIFIED_GATE.minModulesOpened) {

      var modLeft = CERTIFIED_GATE.minModulesOpened - stats.totalModulesOpened;

      parts.push(modLeft + " " + pluralWord(modLeft, "module", "modules"));

    }

    if (!parts.length) return "";

    if (parts.length === 1) return parts[0] + " from Certified";

    return parts.join(" and ") + " from Certified";

  }



  function formatLongevityCountsDetail(stats, targets){

    var safe = normaliseStats(stats);

    function show(val){ return val == null ? 0 : val; }

    return " - " + show(safe.appliedLearningOpened) + "/" + targets.appliedLearning + " applied guides, " +

      show(safe.practicePacksOpened) + "/" + targets.practicePacks + " packs, " +

      show(safe.pdfAssignmentsOpened) + "/" + targets.pdfAssignments + " assignments, " +

      show(safe.distinctActiveMonthsAllTime) + "/" + targets.activeMonths + " active months";

  }



  function formatMomentumCountsDetail(badges, stats, openedCount, examsPassed){

    var next = getNextUnearnedBadge(badges);

    if (!next) return "";

    if (next.key === "graduate") return formatLongevityCountsDetail(stats, GRADUATE_TARGETS);

    if (next.key === "master") return formatLongevityCountsDetail(stats, MASTER_TARGETS);

    return " - " + openedCount + "/60 modules - " + examsPassed + "/15 exams";

  function isTrialNudgeEligible(engagement){

    return engagement && engagement.isTrial === true &&

      engagement.hasConverted !== true &&

      typeof engagement.daysLeftInTrial === "number" && engagement.daysLeftInTrial > 0;

  }



  function formatTrialNudgeClause(engagement, rag, modulesOpened, activeDays, engagementDegraded, badges){

    if (!isTrialNudgeEligible(engagement)) return "";

    var next = getNextUnearnedBadge(badges);

    if (!next) return "";

    var days = engagement.daysLeftInTrial;

    if (next.key === "foundation") {

      if (!modulesOpened && (!activeDays || engagementDegraded)) {

        return "Welcome - you've got " + days + " days to explore. Open a module to get going.";

      }

      var modShort = Math.max(0, FOUNDATION_GATE.minModules - modulesOpened);

      var dayShort = engagementDegraded ? 0 : Math.max(0, FOUNDATION_GATE.minActiveDays - activeDays);

      var nearlyThere = rag.state === "green" ||

        (modShort <= 1 && dayShort <= 1 && (modShort > 0 || dayShort > 0));

      if (nearlyThere) {

        return "You've got " + days + " days to earn your Foundation badge - you're nearly there.";

      }

      return "Lots of time to earn your Foundation badge - " + days + " days to enjoy the modules.";

    }

    if (next.key === "practitioner") {

      return "Lots of time to keep exploring - " + days + " days left in your trial.";

    }

    return "You've got " + days + " days left in your trial to keep building.";

  }



  function formatGoalTileTrialLine(engagement, badges){

    if (!isTrialNudgeEligible(engagement)) return "";

    if (!getNextUnearnedBadge(badges)) return "";

    return "Plenty of time in your trial to get there.";

  }



  function computeMomentumRag(badges, stats, activeDays, engagementDegraded){

    var foundation = badges.filter(function(b){ return b.key === "foundation"; })[0];

    if (!foundation || !foundation.earned) {

      var modShort = Math.max(0, FOUNDATION_GATE.minModules - stats.foundationModulesOpened);

      var dayShort = engagementDegraded ? 0 : Math.max(0, FOUNDATION_GATE.minActiveDays - activeDays);

      var proximity = formatFoundationProximity(stats.foundationModulesOpened, activeDays, engagementDegraded);

      if (!stats.foundationModulesOpened && (!activeDays || engagementDegraded)) {

        return { state: "red", label: proximity || "Just getting started", color: RAG_COLORS.red };

      }

      if (!engagementDegraded && modShort <= 1 && dayShort <= 1 && (modShort > 0 || dayShort > 0)) {

        return { state: "green", label: "Almost there - 1 step from Foundation", color: RAG_COLORS.green };

      }

      return { state: "amber", label: proximity || "Building momentum", color: RAG_COLORS.amber };

    }

    var practitioner = badges.filter(function(b){ return b.key === "practitioner"; })[0];

    if (practitioner && !practitioner.earned) {

      var pReq = practitionerRequirementsMet(stats);

      var pLabel = formatPractitionerProximity(stats);

      if (pReq.met >= pReq.total - 1 && pReq.met < pReq.total) return { state: "green", label: pLabel || "Almost there", color: RAG_COLORS.green };

      return { state: "amber", label: pLabel || "Building momentum", color: RAG_COLORS.amber };

    }

    var certified = badges.filter(function(b){ return b.key === "certified"; })[0];

    if (certified && !certified.earned) {

      var cLabel = formatCertifiedProximity(stats);

      var examLeft = Math.max(0, 15 - stats.examsPassed);

      var modLeft = Math.max(0, CERTIFIED_GATE.minModulesOpened - stats.totalModulesOpened);

      if (examLeft <= 1 && modLeft <= 1 && (examLeft > 0 || modLeft > 0)) {

        return { state: "green", label: cLabel || "Almost there for Certified", color: RAG_COLORS.green };

      }

      return { state: "amber", label: cLabel || "Building toward Certified", color: RAG_COLORS.amber };

    }

    var graduate = badges.filter(function(b){ return b.key === "graduate"; })[0];

    if (graduate && !graduate.earned) {

      var gReq = graduateRequirementsMet(stats);

      var gLabel = formatGraduateProximity(stats);

      if (gReq.met >= gReq.total - 1 && gReq.met < gReq.total) return { state: "green", label: gLabel || "Almost there for Graduate", color: RAG_COLORS.green };

      return { state: "amber", label: gLabel || "Building toward Graduate", color: RAG_COLORS.amber };

    }

    var master = badges.filter(function(b){ return b.key === "master"; })[0];

    if (master && !master.earned) {

      var mReq = masterRequirementsMet(stats);

      var mLabel = formatMasterProximity(stats);

      if (mReq.met >= mReq.total - 1 && mReq.met < mReq.total) return { state: "green", label: mLabel || "Almost there for Master", color: RAG_COLORS.green };

      return { state: "amber", label: mLabel || "Building toward Master", color: RAG_COLORS.amber };

    }

    if (!getNextUnearnedBadge(badges)) {

      return { state: "green", label: "All badges earned", color: RAG_COLORS.green };

    }

    return { state: "amber", label: "Building momentum", color: RAG_COLORS.amber };

  }

  function waitForMemberstack(maxMs){

    maxMs = typeof maxMs === "number" ? maxMs : 8000;

    return new Promise(function(resolve){

      var start = Date.now();

      (function tick(){

        if (window.$memberstackDom && typeof window.$memberstackDom.getMemberJSON === "function") {

          resolve(window.$memberstackDom);

          return;

        }

        if ((Date.now() - start) > maxMs) { resolve(null); return; }

        setTimeout(tick, 100);

      })();

    });

  }

    }

  }



  function setGhostSessionContext(memberId, email){

    try {

      sessionStorage.setItem(GHOST_CONTEXT_KEY, JSON.stringify({

        memberId: memberId || null,

        email: email || null,

        setAt: Date.now()

      }));

    } catch (e) { /* ignore */ }

  }



  function clearGhostSessionContext(){

    try { sessionStorage.removeItem(GHOST_CONTEXT_KEY); } catch (e) { /* ignore */ }

  }



  function isGhostIdSource(src){

    return !!(src && String(src).indexOf("ghost_") === 0);

  }



  function syncGhostFlagsFromResolved(resolved, ghostCtx, ghostModeIn, ghostMemberIdIn){

    if (isGhostIdSource(resolved && resolved.idSource) && resolved.memberId) {

      return { ghostMode: true, ghostMemberId: String(resolved.memberId) };

    }

    if (ghostCtx && ghostCtx.ghostMode) {

      return {

        ghostMode: true,

        ghostMemberId: ghostMemberIdIn || ghostCtx.ghostMemberId || null

      };

    }

    return { ghostMode: !!ghostModeIn, ghostMemberId: ghostModeIn ? (ghostMemberIdIn || null) : null };

  }



  function resolveGhostContextFromPage(){

    var url = readGhostUrlParams();

    if (!url.ghostMemberId && !url.ghostEmail) {

      clearGhostSessionContext();

      if (globalThis.__arMsReader) globalThis.__arMsReader.invalidate();

      return { ghostMode: false };

    }

    setGhostSessionContext(url.ghostMemberId, url.ghostEmail);

    return {

      ghostMode: true,

      ghostMemberId: url.ghostMemberId || null,

      ghostEmail: url.ghostEmail || null,

      idSource: url.ghostMemberId ? "ghost_url" : "ghost_email"

    };

  }



  async function fetchGhostMemberData(ms, ghostMemberId, ghostEmail){

    var adminMember = null;

    try {

      if (ms && typeof ms.getCurrentMember === "function") {

        adminMember = await ms.getCurrentMember();

      }

    } catch (e) { /* ignore */ }

    var adminId = getMemberId(adminMember);

    var apiUrl = GHOST_LOGIN_URL + "?";

    if (ghostMemberId) apiUrl += "memberId=" + encodeURIComponent(ghostMemberId);

    else if (ghostEmail) apiUrl += "email=" + encodeURIComponent(ghostEmail);

    else throw new Error("ghost member id or email required");

    var fetchOptions = { method: "GET", credentials: "include" };

    if (adminId) fetchOptions.headers = { "X-Memberstack-Id": adminId };

    var res = await fetch(apiUrl, fetchOptions);

    if (!res.ok) throw new Error("ghost-login HTTP " + res.status);

    return await res.json();

  }



  async function resolveMemberId(ms, member){

    var ghostCtx = resolveGhostContextFromPage();

    if (ghostCtx.ghostMode && (ghostCtx.ghostMemberId || ghostCtx.ghostEmail)) {

      if (ghostCtx.ghostMemberId) {

        return { memberId: String(ghostCtx.ghostMemberId), idSource: ghostCtx.idSource || "ghost" };

      }

      return { memberId: null, idSource: ghostCtx.idSource || "ghost_email" };

    }

    var memberId = getMemberId(member);

    var idSource = memberId ? "getCurrentMember" : "none";

    if (!memberId) {

      var identity = await fetchWhoami();

      if (identity && identity.memberstack_id) {

        memberId = String(identity.memberstack_id);

        idSource = "whoami";

      }

    }

    return { memberId: memberId, idSource: idSource };

  }



  function unwrapMember(res){

    if (!res) return null;

    if (res.data && (res.data.email || res.data.planConnections || res.data.id)) return res;

    if (res.email || res.planConnections) return { id: res.id || null, data: res };

    if (res.data && res.data.data) return res.data;

    return res;

  }



  async function fetchTrialExpired(memberId){

    if (!memberId) return false;

    try {

      var res = await fetch(TRIAL_STATUS_URL + "?memberId=" + encodeURIComponent(memberId), { credentials: "omit" });

      if (!res.ok) return false;

      var data = await res.json();

      return !!(data && (data.isExpiredTrial || data.state === "expired-trial"));

    } catch (e) { return false; }

  }



  async function fetchExamProgress(memberId){

    if (!memberId) return null;

    try {

      var res = await fetch(PROGRESS_URL, {

        headers: { "X-Memberstack-Id": memberId },

        credentials: "omit"

      });

      if (!res.ok) return null;

      return await res.json();

    } catch (e) { return null; }

  }



  async function fetchEngagementSummary(memberId){

    if (!memberId) return null;

    var cacheKey = "ar-engagement-" + memberId;

    try {

      var raw = sessionStorage.getItem(cacheKey);

      if (raw) {

        var cached = JSON.parse(raw);

        if (cached && cached.at && Date.now() - cached.at < 300000) return cached.data;

      }

    } catch (e) { /* ignore */ }



    try {

      var res = await fetch(ENGAGEMENT_URL, {

        headers: { "X-Memberstack-Id": memberId },

        credentials: "omit"

      });

      if (!res.ok) {

        console.warn("[do-next-strip] engagement-summary failed:", res.status);

        return null;

      }

      var data = await res.json();

      try {

        sessionStorage.setItem(cacheKey, JSON.stringify({ at: Date.now(), data: data }));

      } catch (e2) { /* ignore */ }

      return data;

    } catch (e) {

      console.warn("[do-next-strip] engagement-summary error");

      return null;

    }

  }



  function isAdminPreviewUser(memberId, email){

    if (memberId && ADMIN_MEMBER_IDS[memberId]) return true;

    var e = (email || "").toLowerCase();

    return !!(e && ADMIN_EMAILS[e]);

  }



  function resolvePreviewLastActivityAt(params){

    var raw = params.get("lastactivity") || params.get("lastActivity");

    var nowMs = Date.now();

    if (raw === null || raw === "") return new Date(nowMs).toISOString();

    var lower = String(raw).toLowerCase();

    if (lower === "today" || lower === "0") return new Date(nowMs).toISOString();

    var days = parseInt(raw, 10);

    if (!isNaN(days)) return new Date(nowMs - days * 86400000).toISOString();

    return new Date(nowMs).toISOString();

  }



  function parsePreviewConfig(memberId, email){

    if (!isAdminPreviewUser(memberId, email)) return null;

    try {

      var params = new URLSearchParams(window.location.search);

      if (params.get("ar_preview") !== "1") return null;

      var state = (params.get("state") || "trial").toLowerCase();

      var trialDays = parseInt(params.get("trialdays") || params.get("days") || "8", 10);

      var modules = parseInt(params.get("modules") || params.get("modulesopened") || "0", 10);

      var activeDays = parseInt(params.get("activedays") || params.get("active_days") || "0", 10);

      var exams = parseInt(params.get("exams") || params.get("examspassed") || "0", 10);

      var appliedLearning = parseInt(params.get("appliedlearning") || params.get("appliedLearning") || "0", 10);

      var practicePacks = parseInt(params.get("practicepacks") || params.get("practicePacks") || "0", 10);

      var pdfAssignments = parseInt(params.get("pdfassignments") || params.get("pdfAssignments") || "0", 10);

      var activeMonths = parseInt(params.get("activemonths") || params.get("activeMonths") || "0", 10);

      if (state === "annual" && !params.has("modules")) modules = 20;

      if (state === "annual" && !params.has("activedays")) activeDays = 7;

      if (state === "annual" && !params.has("exams")) exams = 2;

      return {

        state: state,

        trialDaysLeft: isNaN(trialDays) ? 8 : trialDays,

        modulesOpened: isNaN(modules) ? 0 : modules,

        activeDays: isNaN(activeDays) ? 0 : activeDays,

        examsPassed: isNaN(exams) ? 0 : exams,

        appliedLearning: isNaN(appliedLearning) ? 0 : appliedLearning,

        practicePacks: isNaN(practicePacks) ? 0 : practicePacks,

        pdfAssignments: isNaN(pdfAssignments) ? 0 : pdfAssignments,

        activeMonths: isNaN(activeMonths) ? 0 : activeMonths,

        lastActivityAt: resolvePreviewLastActivityAt(params)

      };

    } catch (e) { return null; }

  }



  function buildPreviewOpenedSet(count){

    var set = new Set();

    var n = Math.max(0, Math.min(count, FOUNDATION_MODULE_PATHS.length));

    for (var i = 0; i < n; i++) set.add(FOUNDATION_MODULE_PATHS[i]);

    return set;

  }



  function buildPreviewExamInfo(examsPassed){

    var n = Math.max(0, Math.min(15, examsPassed || 0));

    return {

      examsPassed: n,

      hasModuleStatus: false,

      statusMap: {},

      source: "preview",

      nextExamModuleId: null

    };

  }



  function buildPreviewEngagement(preview){

    var longevity = {

      appliedLearningOpened: preview.appliedLearning,

      practicePacksOpened: preview.practicePacks,

      pdfAssignmentsOpened: preview.pdfAssignments,

      distinctActiveMonthsAllTime: preview.activeMonths

    };

    if (preview.state === "annual") {

      return Object.assign({

        isTrial: false,

        hasConverted: true,

        daysLeftInTrial: null,

        distinctActiveDaysFirst14d: preview.activeDays,

        lastActivityAt: preview.lastActivityAt

      }, longevity);

    }

    if (preview.state === "expired") {

      return Object.assign({

        isTrial: false,

        hasConverted: false,

        daysLeftInTrial: null,

        distinctActiveDaysFirst14d: preview.activeDays,

        lastActivityAt: preview.lastActivityAt

      }, longevity);

    }

    return Object.assign({

      isTrial: true,

      hasConverted: false,

      daysLeftInTrial: preview.trialDaysLeft,

      distinctActiveDaysFirst14d: preview.activeDays,

      lastActivityAt: preview.lastActivityAt

    }, longevity);

  }



  function renderPreviewRibbon(strip, coachDebug){

    var ribbon = document.getElementById("ar-do-next-preview-ribbon");

    if (!coachDebug || !coachDebug.previewMode) {

      if (ribbon) ribbon.remove();

      return;

    }

    if (!ribbon) {

      ribbon = document.createElement("div");

      ribbon.id = "ar-do-next-preview-ribbon";

      ribbon.className = "ar-do-next-preview-ribbon";

      var inner = strip.querySelector(".ar-do-next-strip__inner");

      if (inner) inner.insertBefore(ribbon, inner.firstChild);

    }

    var p = coachDebug.previewMode;

    var dayNote = p.state === "trial" ? ", day " + p.trialDaysLeft : "";

    ribbon.textContent = "PREVIEW MODE - " + p.state + dayNote;

  }



  function trackPageView(memberId, email){

    if (doNextRuntime.ghostMode || !memberId) return;

    var key = "ar-pv-dashboard-" + memberId;

    try {

      if (sessionStorage.getItem(key) === "1") return;

      sessionStorage.setItem(key, "1");

    } catch (e) { /* ignore */ }



    fetch(TRACK_URL, {

      method: "POST",

      headers: { "Content-Type": "application/json" },

      credentials: "omit",

      body: JSON.stringify({

        member_id: memberId,

        email: email || null,

        path: "/academy/dashboard",

        title: "Academy Dashboard",

        category: "dashboard",

        meta: { source: "do-next-strip", surface: "dashboard" }

      })

    }).catch(function(){ /* non-blocking */ });

  }



  function watchExpiredTrial(onChange){

    if (!document.body) return;

    if (isExpiredTrialBody()) onChange(true);

    var obs = new MutationObserver(function(){ onChange(isExpiredTrialBody()); });

    obs.observe(document.body, { attributes: true, attributeFilter: ["data-ar-academy-state"] });

    setTimeout(function(){ obs.disconnect(); }, 30000);

  }



  async function init(){

    if (!isDashboardPath()) return;

    var strip = document.getElementById("ar-do-next-strip");

    if (!strip) return;



    setCoachStatusLoading();



    try {

    strip.classList.add("is-ready");

    strip.removeAttribute("aria-hidden");

    scheduleLayout();



    watchExpiredTrial(function(expired){

      if (expired) {

        strip.classList.remove("is-ready");

        strip.setAttribute("aria-hidden", "true");

        scheduleLayout();

      }

    });

    if (isExpiredTrialBody()) {

      strip.classList.remove("is-ready");

      strip.setAttribute("aria-hidden", "true");

      scheduleLayout();

      return;

    }



    var ms = await waitForMemberstack();

    if (!ms) {

      var statusEl = document.getElementById("ar-do-next-status");

      if (statusEl) {

        statusEl.classList.remove("is-loading");

        statusEl.textContent = "Sign in to see your learning coach.";

      }

      strip.classList.add("is-ready");

      return;

    }



    var ghostCtx = resolveGhostContextFromPage();

    var ghostMode = !!ghostCtx.ghostMode;

    var ghostMemberId = ghostCtx.ghostMemberId || null;

    var ghostEmail = ghostCtx.ghostEmail || null;



    var member = null;

    var jsonRes = null;

    var normalized = {};



    if (ghostMode) {

      try {

        var ghostPayload = await fetchGhostMemberData(ms, ghostMemberId, ghostEmail);

        ghostMemberId = (ghostPayload.member && ghostPayload.member.id) || ghostMemberId;

        jsonRes = ghostPayload.memberJson || {};

        normalized = normalizeMemberJson(jsonRes);

        var ghostEm = (ghostPayload.member && ghostPayload.member.auth && ghostPayload.member.auth.email)

          || (ghostPayload.member && ghostPayload.member.email)

          || ghostEmail

          || "";

        member = { id: ghostMemberId, data: { id: ghostMemberId, email: ghostEm } };

      } catch (ghostErr) {

        console.warn("[do-next-strip] ghost mode load failed:", ghostErr);

        ghostMode = !!ghostCtx.ghostMode;

        ghostMemberId = ghostCtx.ghostMemberId || ghostMemberId || null;

      }

    }



    if (!ghostMode && globalThis.__arMsReader) {

      try {

        var msBundle = await globalThis.__arMsReader.fetchBundle(ms);

        member = msBundle.member;

        jsonRes = msBundle.rawJson;

        normalized = normalizeMemberJson(jsonRes);

      } catch (e) { /* ignore */ }

    }

    if (member && !member.data && (member.planConnections || member.email)) {

      member = { id: member.id || null, data: member };

    }

    if (member && !member.id && member.data && member.data.id) {

      member.id = String(member.data.id);

    }

    var resolved;

    if (ghostMode && ghostMemberId) {

      resolved = { memberId: String(ghostMemberId), idSource: ghostCtx.idSource || "ghost" };

    } else {

      resolved = await resolveMemberId(ms, member);

    }

    var memberId = resolved.memberId;

    var ghostSync = syncGhostFlagsFromResolved(resolved, ghostCtx, ghostMode, ghostMemberId);

    ghostMode = ghostSync.ghostMode;

    ghostMemberId = ghostSync.ghostMemberId;

    doNextRuntime.ms = ms;

    doNextRuntime.memberId = memberId || null;

    doNextRuntime.ghostMode = ghostMode;

    doNextRuntime.ghostMemberId = ghostMode ? (ghostMemberId || memberId || null) : null;



    if (memberId) {

      var expired = await fetchTrialExpired(memberId);

      if (expired || isExpiredTrialBody()) {

        strip.classList.remove("is-ready");

        strip.setAttribute("aria-hidden", "true");

        scheduleLayout();

        return;

      }

    }

    var memberEmail = getMemberEmail(member);

    var preview = parsePreviewConfig(memberId, memberEmail);

    var openedSet = getOpenedSet(normalized);

    var examInfo = parseExamProgress(null);

    var engagement = null;

    var engagementDegraded = true;



    if (preview) {

      openedSet = buildPreviewOpenedSet(preview.modulesOpened);

      examInfo = buildPreviewExamInfo(preview.examsPassed);

      engagement = buildPreviewEngagement(preview);

      engagementDegraded = false;

    } else {

      var progressData = await fetchExamProgress(memberId);

      examInfo = parseExamProgress(progressData);

      engagement = await fetchEngagementSummary(memberId);

      engagementDegraded = !engagement;

    }



    var coachDebug = {

      memberId: memberId || null,

      idSource: resolved.idSource,

      ghostMode: ghostMode,

      ghostMemberId: ghostMode ? (ghostMemberId || memberId || null) : null,

      writesSuppressed: !!ghostMode,

      source: examInfo.source,

      nextExamModuleId: examInfo.nextExamModuleId,

      stage: preview ? "preview" : (ghostMode ? "ghost" : "stage1"),

      engagementDegraded: engagementDegraded,

      distinctActiveDaysFirst14d: engagement ? engagement.distinctActiveDaysFirst14d : null,

      isTrial: engagement ? engagement.isTrial : null,

      daysLeftInTrial: engagement ? engagement.daysLeftInTrial : null,

      hasConverted: engagement ? engagement.hasConverted : null,

      previewMode: preview || null

    };

    window.__arDoNextStrip = coachDebug;



    var gateStats = computeGateStats(normalized, openedSet, examInfo, preview);

    renderStrip(normalized, openedSet, examInfo, coachDebug, engagement, gateStats);

    if (!preview && !ghostMode) trackPageView(memberId, memberEmail);

    } catch (err) {

      console.error("[do-next] init failed:", err);

      var statusEl = document.getElementById("ar-do-next-status");

      if (statusEl) {

        statusEl.classList.remove("is-loading");

        statusEl.textContent = "Learning coach could not load. Refresh the page.";

      }

      strip.classList.add("is-ready");

      strip.removeAttribute("aria-hidden");

      scheduleLayout();

    }

  }



  ensureAcademyLayout();

  wireJourneyToggle();

  watchDoNextStripMetrics();



  function watchStripFocusRefresh(){

    if (window.__arStripFocusWired) return;

    window.__arStripFocusWired = true;

    document.addEventListener("visibilitychange", function(){

      if (document.visibilityState === "visible" && isDashboardPath()) {

        setTimeout(init, 500);

      }

    });

  }



  watchStripFocusRefresh();

  window.addEventListener("scroll", function(){ scheduleLayout(); }, { passive: true });

  if (document.readyState === "loading") {

    document.addEventListener("DOMContentLoaded", init);

  } else {

    init();

  }

  setTimeout(scheduleLayout, 100);

  setTimeout(scheduleLayout, 1000);

  setTimeout(scheduleLayout, 2500);

})();

</script>
