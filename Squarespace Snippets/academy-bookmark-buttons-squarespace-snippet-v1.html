    if (!res) return null;
    if (res.data && (res.data.email || res.data.planConnections || res.data.id)) return res;
    if (res.email || res.planConnections) return { id: res.id || null, data: res };
    if (res.data && res.data.data && (res.data.data.email || res.data.data.planConnections)) return res.data;
    return res;
  }

  function mergeMissingFields(target, source){
    if (!target || typeof target !== "object" || !source || typeof source !== "object") return;
    for (var k in source) {
      if (!Object.prototype.hasOwnProperty.call(source, k)) continue;
      if (target[k] == null) target[k] = source[k];
    }
  }

  function getMemberId(member){
    if (!member) return "";
    if (member.id) return String(member.id);
    if (member.data && member.data.id) return String(member.data.id);
    return "";
  }

  function unwrapStoredJson(obj){
    var cur = obj;
    for (var i = 0; i < 10; i++) {
      if (!cur || typeof cur !== "object") break;
      if (!cur.data || typeof cur.data !== "object") break;
      var d = cur.data;
      var looks = (d.history && Array.isArray(d.history)) ||
        (d.bookmarks && Array.isArray(d.bookmarks)) ||
        (d.arAcademy && typeof d.arAcademy === "object");
      if (looks) { cur = d; continue; }
      break;
    }
    return cur || {};
  }

  function normalizeMemberJson(jsonRes){
    if (!jsonRes || typeof jsonRes !== "object") return {};
    var stored = (jsonRes.data && typeof jsonRes.data === "object") ? jsonRes.data : jsonRes;
    return unwrapStoredJson(stored);
  }

  function getPlanConnections(member){
    if (!member) return [];
    var out = [];
    var seen = {};
    function addList(list){
      if (!Array.isArray(list)) return;
      for (var i = 0; i < list.length; i++) {
        var pc = list[i];
        if (!pc) continue;
        var key = String(pc.planId || pc.id || i);
        if (seen[key]) continue;
        seen[key] = true;
        out.push(pc);
      }
    }
    if (member.data && Array.isArray(member.data.planConnections)) addList(member.data.planConnections);
    if (Array.isArray(member.planConnections)) addList(member.planConnections);
    return out;
  }

  function planConnectionPriceId(pc){
    if (!pc) return "";
    return String((pc.payment && pc.payment.priceId) || pc.priceId || "");
  }

  function isActivePlanConnection(pc){
    if (!pc) return false;
    if (pc.active === false) return false;
    var status = String(pc.status || "").toUpperCase();
    if (status === "CANCELED" || status === "CANCELLED" || status === "EXPIRED" || status === "ENDED") return false;
    return true;
  }

  function hasTrialAccess(member){
    return getPlanConnections(member).some(function(pc){
      return pc && pc.planId === TRIAL_PLAN_ID && isActivePlanConnection(pc);
    });
  }

  function hasAnnualAccess(member){
    var pcs = getPlanConnections(member);
    for (var i = 0; i < pcs.length; i++) {
      var pc = pcs[i];
      if (!isActivePlanConnection(pc)) continue;
      if (pc.planId === ANNUAL_PLAN_ID) return true;
      var priceId = planConnectionPriceId(pc);
      if (priceId === ANNUAL_PRICE_ID || priceId === ANNUAL_WITH_TRIAL_PRICE_ID) return true;
    }
    var data = member && member.data ? member.data : null;
    if (!data) return false;
    for (var k in data) {
      if (!Object.prototype.hasOwnProperty.call(data, k)) continue;
      var v = data[k];
      if (!Array.isArray(v)) continue;
      for (var j = 0; j < v.length; j++) {
        var item = v[j];
        if (!item || typeof item !== "object") continue;
        if (item.priceId === ANNUAL_PRICE_ID || item.priceId === ANNUAL_WITH_TRIAL_PRICE_ID) return true;
      }
    }
    return false;
  }

  function hasAnyNonTrialPlan(member){
    return getPlanConnections(member).some(function(pc){
      return pc && pc.planId && pc.planId !== TRIAL_PLAN_ID && isActivePlanConnection(pc);
    });
  }

  function evaluateAccess(member, ctx){
    var result = { loggedIn: false, hasAccess: false, reason: "not_logged_in", idSource: (ctx && ctx.idSource) || "none" };
    ctx = ctx || {};
    var memberId = getMemberId(member) || ctx.memberId || "";
    if (!memberId && ctx.idSource === "localStorage:arpAcademySeenMember" && hasAcademyJsonData(ctx.normalized)) {
      result.loggedIn = true;
      result.hasAccess = true;
      result.reason = "seen_member_json";
      return result;
    }
    if (!member) return result;
    result.loggedIn = !!memberId;
    if (!memberId) {
      result.reason = "missing_member_id";
      return result;
    }
    try {
      if (hasTrialAccess(member)) {
        result.hasAccess = true;
        result.reason = "trial";
        return result;
      }
      if (hasAnnualAccess(member)) {
        result.hasAccess = true;
        result.reason = "annual";
        return result;
      }
      if (hasAnyNonTrialPlan(member)) {
        result.hasAccess = true;
        result.reason = "non_trial_plan";
        return result;
      }
      result.reason = "no_active_plan";
      return result;
    } catch (e) {
      var pcs = getPlanConnections(member);
      if (pcs.some(function(pc){ return isActivePlanConnection(pc); })) {
        result.hasAccess = true;
        result.reason = "fail_open_active_plan";
        return result;
      }
      result.reason = "access_error";
      return result;
    }
  }

  function hasAccess(member){
    return evaluateAccess(member).hasAccess;
  }

  globalThis.__arAcademyMemberAccess = {
    resolveMemberIdentity: resolveMemberIdentity,
    evaluateAccess: evaluateAccess,
    waitForMemberstack: waitForMemberstack
  };

  function countOpenedModules(normalized){
    var opened = (normalized && normalized.arAcademy && normalized.arAcademy.modules && normalized.arAcademy.modules.opened) || {};
    var set = new Set();
    Object.keys(opened).forEach(function(key){
      var p = normalizePath(key);
      for (var i = 0; i < FOUNDATION_MODULE_PATHS.length; i++) {
        if (FOUNDATION_MODULE_PATHS[i] === p) { set.add(p); break; }
      }
    });
    return set.size;
  }

  async function fetchExamProgress(memberId){
    if (!memberId) return null;
    try {
      var res = await fetch(PROGRESS_URL, {
        headers: { "X-Memberstack-Id": memberId },
        credentials: "omit"
      });
      if (!res.ok) return null;
      return await res.json();
    } catch (e) {
      return null;
    }
  }

  function passedExamCount(progressData){
    var n = 0;
    var mods = progressData && Array.isArray(progressData.modules) ? progressData.modules : [];
    mods.forEach(function(m){
      if (m && m.status === "passed") n++;
    });
    if (n === 0 && progressData && progressData.summary && typeof progressData.summary.passedCount === "number") {
      n = progressData.summary.passedCount;
    }
    return n;
  }

  function placeStripAfterForwardButtons(strip){
    var widget = document.getElementById("ar-bookmark-widget");
    var examBtn = document.getElementById("ar-take-exam-btn");
    var nextBtn = document.getElementById("ar-next-module-btn");
    var anchor = examBtn && !examBtn.classList.contains("is-hidden") ? examBtn
      : (nextBtn && !nextBtn.classList.contains("is-hidden") ? nextBtn : null);
    if (!widget || !strip) return;
    if (anchor && anchor.parentElement === widget) {
      anchor.insertAdjacentElement("afterend", strip);
      return;
    }
    var help = document.getElementById("bookmark-help");
    if (help && help.parentElement === widget) help.insertAdjacentElement("beforebegin", strip);
  }

  var SIGNUP_CTA_COPY = "Get all 60 modules + certificates - free \u2192";

  function applyLessonPageBodyClass(){
    if (document.body && !document.body.classList.contains("ar-academy-lesson")) {
      document.body.classList.add("ar-academy-lesson");
    }
  }

  function renderSignupStrip(el){
    el.classList.remove("is-progress");
    el.innerHTML = '<a class="ar-lesson-signup-cta" href="' + SIGNUP_URL + '">' + SIGNUP_CTA_COPY + '</a>';
    el.classList.remove("is-hidden");
    el.removeAttribute("aria-hidden");
    placeStripAfterForwardButtons(el);
  }

  function renderProgressStrip(el, openedCount, examsPassed){
    var pct = Math.round((openedCount / MODULES_TOTAL) * 100);
    el.classList.add("is-progress");
    el.innerHTML =
      '<p class="ar-lesson-progress-stats">Modules opened: ' + openedCount + '/' + MODULES_TOTAL + ' - Exams passed: ' + examsPassed + '/15</p>' +
      '<div class="ar-lesson-progress-bar" role="progressbar" aria-valuenow="' + pct + '" aria-valuemin="0" aria-valuemax="100">' +
      '<div class="ar-lesson-progress-bar__fill" style="width:' + pct + '%;"></div></div>';
    el.classList.remove("is-hidden");
    el.removeAttribute("aria-hidden");
    placeStripAfterForwardButtons(el);
  }

  function trackLessonPageView(memberId, email){
    if (!memberId) return;
    var path = normalizePath(window.location.pathname);
    if (path.indexOf("/blog-on-photography/") !== 0) return;
    var key = "ar-pv-lesson-" + memberId + "-" + path;
    try {
      if (sessionStorage.getItem(key) === "1") return;
      sessionStorage.setItem(key, "1");
    } catch (e) { /* ignore */ }

    fetch(TRACK_URL, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      credentials: "omit",
      body: JSON.stringify({
        member_id: memberId,
        email: email || null,
        path: path,
        title: document.title || null,
        category: "lesson",
        meta: { source: "lesson-widget", surface: "lesson" }
      })
    }).catch(function(){ /* non-blocking */ });
  }

  function trackLessonModuleOpen(memberId, path){
    if (!memberId || !path) return;
    var key = "ar-mo-lesson-" + memberId + "-" + path;
    try {
      if (sessionStorage.getItem(key) === "1") return;
      sessionStorage.setItem(key, "1");
    } catch (e) { /* ignore */ }

    fetch(TRACK_TILE_OPEN_URL, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      credentials: "omit",
      keepalive: true,
      body: JSON.stringify({
        member_id: memberId,
        section: "modules",
        key: path,
        title: document.title || "",
        url: SITE + path,
        category: "lesson"
      })
    }).catch(function(){ /* non-blocking */ });
  }

  async function wireMemberStrip(){
    var strip = document.getElementById("ar-lesson-member-strip");
    if (!strip) return;
    if (strip.dataset.wired === "1" && strip.dataset.wiredFinal === "1") return;

    var ms = await waitForMemberstack();
    var ctx = { member: null, memberId: "", idSource: "none", normalized: {} };
    if (ms) {
      try { ctx = await resolveMemberIdentity(ms); } catch (e) { /* ignore */ }
    }

    var access = evaluateAccess(ctx.member, ctx);
    access.idSource = ctx.idSource;
    access.modulesTotal = MODULES_TOTAL;
    window.__arLessonAccess = access;

    if (!access.loggedIn || !access.hasAccess) {
      renderSignupStrip(strip);
      if (access.reason !== "missing_member_id") {
        strip.dataset.wired = "1";
        strip.dataset.wiredFinal = "1";
      }
      return;
    }

    var memberId = ctx.memberId || getMemberId(ctx.member);
    var openedCount = countOpenedModules(ctx.normalized);
    var progressData = await fetchExamProgress(memberId);
    var examsPassed = passedExamCount(progressData);
    renderProgressStrip(strip, openedCount, examsPassed);
    access.modulesOpened = openedCount;
    window.__arLessonAccess = access;

    var member = ctx.member || {};
    var email = (member.data && (member.data.email || member.data.emailAddress)) || member.email || "";
    var lessonPath = normalizePath(window.location.pathname);
    trackLessonPageView(memberId, email);
    if (lessonPath.indexOf("/blog-on-photography/") === 0) {
      trackLessonModuleOpen(memberId, lessonPath);
    }
    strip.dataset.wired = "1";
    strip.dataset.wiredFinal = "1";
  }

  function kickMemberStrip(){
    var strip = document.getElementById("ar-lesson-member-strip");
    if (strip && strip.dataset.wiredFinal === "1") return;
    wireMemberStrip();
    setTimeout(function() {
      var s = document.getElementById("ar-lesson-member-strip");
      if (s && s.dataset.wiredFinal !== "1") wireMemberStrip();
    }, 1500);
  }

  async function wireBookmark(){
    var btn = document.getElementById('bookmark-btn');
    if (!btn || btn.dataset.wired === "1") return;

    btn.addEventListener('click', async () => {
      btn.querySelector('span').textContent = "Saving...";

      const ms = await waitForMemberstack();
      if (!ms) { btn.querySelector('span').textContent = "Try again"; return; }

      // Memberstack JSON is sometimes nested; handle both shapes safely
      const bundle = await globalThis.__arMsReader.fetchBundle(ms);
      const mj = bundle.rawJson;
      const root = (mj && typeof mj === "object" && mj.data) ? mj.data : mj;
      const memberJson = (root && root.data && typeof root.data === "object") ? root.data : (root || {});

      let bookmarks = Array.isArray(memberJson.bookmarks) ? memberJson.bookmarks : [];

      const page = { title: document.title, url: normAbsUrl() };

      if (!bookmarks.find(b => (b && b.url) === page.url)) {
        bookmarks.push(page);
        if (bookmarks.length > 20) bookmarks = bookmarks.slice(bookmarks.length - 20);

        memberJson.bookmarks = bookmarks;

        // Write back preserving wrapper if present
        if (root && root.data && typeof root.data === "object") root.data = memberJson;

        await ms.updateMemberJSON({ json: (mj && mj.data) ? mj : memberJson });
        globalThis.__arMsReader.patchJson(memberJson, mj);

        btn.style.background = "#28a745";
        btn.querySelector('span').textContent = "Bookmarked!";
      } else {
        btn.querySelector('span').textContent = "Already Bookmarked";
      }
    });

    btn.dataset.wired = "1";
  }

  applyLessonPageBodyClass();

  // Use MutationObserver so it doesn't "flash then vanish" when Sqsp reflows content
  function init(){
    applyLessonPageBodyClass();
    moveWidgetOnce();
    wireBookmark();
    wireNextModuleButtons();
    kickMemberStrip();

    var obs = new MutationObserver(function(){
      moveWidgetOnce();
      wireBookmark();
      wireNextModuleButtons();
      var strip = document.getElementById("ar-lesson-member-strip");
      if (!strip || strip.dataset.wiredFinal !== "1") kickMemberStrip();
    });

    obs.observe(document.documentElement, { childList:true, subtree:true });

    // Stop observing after 15s (prevents any performance issues)
    setTimeout(function(){ obs.disconnect(); }, 15000);
  }

  if (document.readyState === "loading") {
    document.addEventListener("DOMContentLoaded", init);
  } else {
    init();
  }
})();
</script>
